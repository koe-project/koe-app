<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Koe - 声で綴る一ヶ月</title>
  
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      console.error("Global Error:", error || message);
    };
  </script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    body { 
      font-family: 'Noto Sans JP', sans-serif; 
      margin: 0; padding: 0; 
      background: linear-gradient(180deg, #1e293b 0%, #334155 35%, #475569 65%, #d97706 100%);
      height: 100vh; color: white; -webkit-font-smoothing: antialiased; overflow: hidden;
    }
    .font-serif { font-family: 'Noto Serif JP', serif; }
    .app-container { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 600px; margin: 0 auto; position: relative; }
    .text-shadow-premium { text-shadow: 0 2px 15px rgba(0,0,0,0.8), 0 1px 4px rgba(0,0,0,0.6); }
    .btn-glass {
      background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3); color: white; transition: all 0.4s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .btn-glass:active:not(:disabled) { transform: scale(0.96); background: rgba(255, 255, 255, 0.3); }
    .btn-glass:disabled { opacity: 0.6; cursor: not-allowed; }
    .fade-in { animation: fadeInEffect 1.2s ease-out forwards; }
    @keyframes fadeInEffect { from { opacity: 0; } to { opacity: 1; } }
    .loader-spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    
    .mic-wave { display: flex; align-items: center; gap: 4px; height: 60px; }
    .mic-bar { width: 6px; background: white; border-radius: 3px; transition: height 0.05s ease; min-height: 4px; }
    
    .step-tab { flex: 1; padding: 12px 0; font-size: 0.9rem; text-align: center; border-bottom: 2px solid transparent; color: rgba(255,255,255,0.3); transition: all 0.3s ease; font-weight: 500; }
    .step-tab.active { color: white; border-bottom-color: white; font-weight: bold; }

    .custom-select {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 2px 8px;
      color: white;
      outline: none;
      cursor: pointer;
    }
    .custom-select option {
      color: black;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // ★ ここにGASでデプロイしたウェブアプリのURLを貼り付けます
    // ==========================================
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbx5ezIitjgUjqxuLZVk6RoYp2zY8RLimJp0qk5vrxbLC-qB4o56-796M81dUwXOSpJO/exec";

    const callGasApi = async (action, payload) => {
      // Canvas（プレビュー）環境やURL未設定時のためのモック（ダミー）動作
      if (!GAS_API_URL || GAS_API_URL.includes("ここに")) {
        console.warn("GAS_API_URLが設定されていないため、デモモード（モックデータ）で動作します。");
        return new Promise((resolve) => {
          setTimeout(() => {
            if (action === 'generateSteps') {
              resolve({
                success: true,
                data: {
                  step1: "【デモモード】\n" + (payload.transcript || "（音声が入力されませんでした）") + "、ですね。",
                  step2: "【デモモード】\n本番環境でGASのURLを設定すると、ここにAIによる美しい整形テキストが表示されます。現在はデモ版として動作しています。",
                  tags: ["家族", "思い出"],
                  era: "20代",
                  emotion: "穏やか"
                }
              });
            } else if (action === 'saveAnswer') {
              resolve({ success: true });
            } else {
              resolve({ success: false, error: 'Unknown action' });
            }
          }, 1500); // 通信を模した意図的な遅延
        });
      }
      
      // 実際のGASへの通信
      const response = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: action, ...payload })
      });
      
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }
      return await response.json();
    };

    const CONTENT = {
      weeks: [
        {
          number: 1, title: "Week 1", theme: "思い出すって、悪くない",
          questions: [
            "人生で一番おいしかった旅行のご飯は何でしたか？\nその時の場面も教えてください。",
            "子供の頃、よくやっていた遊びや、よく行っていた場所はどこでしたか？",
            "振り返ると、楽しかったなと思える時期はいつ頃ですか？",
            "子供の頃に住んでいた家について、どんな思い出がありますか？",
            "昔よく聴いていた音楽や、印象に残っている曲はありますか？",
            "昔は当たり前だったけれど、今は少し懐かしく感じる習慣はありますか？"
          ]
        },
        {
          number: 2, title: "Week 2", theme: "頑張ってきた時間を、言葉にする",
          questions: [
            "これまでの人生で、一番大変だった時期はいつ頃でしたか？\nその頃のことを、少し思い出せる範囲で教えてください。",
            "その「大変だった時期」を思い出すと、当時の自分は、どんな気持ちで日々を過ごしていたと思いますか？",
            "それでも「大変だった時期」を乗り越えられた理由は何だったと思いますか？",
            "仕事や役割を続ける中で、大事にしてきた考え方や癖はありますか？",
            "あまり言葉にしてこなかったけれど、今振り返ると「自分なりに頑張っていたな」と思うことはありますか？",
            "これまでの人生で、「よくやっていたな」と思える頃の自分に、今ならどんな言葉をかけてあげたいですか？"
          ]
        },
        {
          number: 3, title: "Week 3", theme: "言わなかったことに、触れてみる",
          questions: [
            "家族との思い出で、今でもよく覚えている場面はありますか？",
            "ご自身の親について、子供たちにあまり話してこなかった思い出はありますか？",
            "子供が生まれた時のこと、\n正直どんな気持ちでしたか？",
            "家族に、これまで言葉にしてこなかった想いはありますか？",
            "今だから言える、家族への感謝や本音があれば教えてください。",
            "今振り返ってみて、「これでよかった」と思える家族との関わり方はありますか？"
          ]
        },
        {
          number: 4, title: "Week 4", theme: "未来へ、手渡す",
          questions: [
            "人生で「これは大事にしてきた」と言えるものは何ですか？",
            "振り返ると、「あの選択はよくやったな」と思えることはありますか？",
            "昔は「失敗した」とか「恥ずかしい」と思っていたけれど、今振り返ると、少し笑って話せる出来事はありますか？",
            "子供たちに、今すぐ理解されなくてもいいから、いつか伝わってほしいことは何ですか？",
            "家族が困ったとき、思い出してほしい自分の姿はありますか？",
            "いつか家族がこの言葉を読むとしたら、そのとき、どんな気持ちでいてくれたら嬉しいですか？"
          ]
        },
        {
          number: 5, title: "", theme: "この時間を閉じる前に",
          questions: [
            "語りきれなかったことがあれば、自由にお話しください。\nどんなテーマでも、今の気持ちのままに。"
          ]
        }
      ]
    };

    const CustomIcon = ({ name, size = 24, className = "" }) => {
      const paths = {
        'mic': <><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" x2="12" y1="19" y2="22"/></>,
        'square': <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>,
        'play': <polygon points="5 3 19 12 5 21 5 3"/>,
        'pause': <><rect width="4" height="16" x="6" y="4"/><rect width="4" height="16" x="14" y="4"/></>,
        'chevron-down': <path d="m6 9 6 6 6-6"/>,
        'loader-2': <path d="M21 12a9 9 0 1 1-6.219-8.56"/>,
        'check': <path d="M20 6 9 17l-5-5"/>,
        'alert-circle': <><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></>,
        'tag': <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" />
      };
      return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{paths[name] || null}</svg>;
    };

    function App() {
      const [view, setView] = useState('top'); 
      const [weekIdx, setWeekIdx] = useState(0);
      const [qIndex, setQIndex] = useState(0); 
      const [currentData, setCurrentData] = useState(null); 

      const handleNextQuestion = () => {
        let nq = qIndex + 1;
        let nw = weekIdx;
        if (nq >= CONTENT.weeks[nw].questions.length) {
          nq = 0;
          nw = (nw + 1) % CONTENT.weeks.length;
        }
        setWeekIdx(nw);
        setQIndex(nq);
      };

      const handleJump = (w, q) => {
        setWeekIdx(w);
        setQIndex(q);
      };

      const handleSave = (ansData, audioBase64, callback) => {
        const payload = {
          data: {
            ...ansData,
            audioBase64: audioBase64,
            questionId: weekIdx < 4 ? `Week ${weekIdx + 1}-${qIndex + 1}` : `Final-${qIndex + 1}`,
            weekNumber: weekIdx + 1
          }
        };

        const onComplete = () => {
          if (weekIdx === 4) setView('epilogue');
          else setView('thank_you');
          if (callback) callback();
        };

        callGasApi('saveAnswer', payload)
          .then(res => {
            if (res.success) {
              onComplete();
            } else {
              console.error("Save failed:", res.error);
              alert("保存に失敗しました: " + res.error);
              if(callback) callback();
            }
          })
          .catch(err => {
            console.error("Save Error:", err);
            alert("通信エラーが発生しました。");
            if(callback) callback();
          });
      };

      return (
        <div className="app-container font-serif">
          {view === 'top' && <TopView onNext={() => setView('intro')} />}
          {view === 'intro' && <IntroView onNext={() => setView('sound_check')} />}
          {view === 'sound_check' && <SoundCheckView onNext={() => setView('week_start')} />}
          {view === 'week_start' && (
            <WeekStartView 
              weekIdx={weekIdx}
              qIndex={qIndex}
              onJump={handleJump}
              onAnother={handleNextQuestion}
              onNext={() => setView('recording')} 
              onFinishSpeak={() => setView('epilogue')}
            />
          )}
          {view === 'recording' && <RecordingView 
            questionText={CONTENT.weeks[weekIdx].questions[qIndex]} 
            onComplete={(recordingData) => { 
              setCurrentData(recordingData); 
              setView('review'); 
            }} 
          />}
          {view === 'review' && <ReviewView data={currentData} onBack={() => setView('week_start')} onSave={handleSave} />}
          {view === 'thank_you' && (
            <ThankYouView 
              onFinish={() => { setWeekIdx(0); setQIndex(0); setView('top'); }} 
              onContinue={() => { handleNextQuestion(); setView('week_start'); }} 
            />
          )}
          {view === 'epilogue' && (
            <EpilogueView onHome={() => { setWeekIdx(0); setQIndex(0); setView('top'); }} />
          )}
        </div>
      );
    }

    function TopView({ onNext }) {
      return (
        <div className="h-full w-full flex flex-col justify-between items-center py-20 px-10 fade-in">
          <div className="flex flex-col items-center pt-10 w-full max-w-[300px]">
            <h1 className="text-8xl tracking-[0.1em] text-white text-shadow-premium lowercase font-serif">koe</h1>
            <p className="text-white font-serif tracking-[0.15em] text-[1.1rem] text-shadow-premium leading-relaxed text-center mt-6">1ヶ月の回想体験。<br />語るだけ。残る。</p>
            <div className="h-px w-full bg-gradient-to-r from-transparent via-white/40 to-transparent mt-6"></div>
          </div>
          <button onClick={onNext} className="animate-bounce flex flex-col items-center gap-2 text-white/50 hover:text-white transition-all"><CustomIcon name="chevron-down" size={40} /></button>
        </div>
      );
    }

    function IntroView({ onNext }) {
      return (
        <div className="h-full w-full flex flex-col justify-between items-center py-16 px-10 fade-in text-center">
          <div className="space-y-10 flex-1 flex flex-col justify-center text-shadow-premium">
            <p className="text-[1.1rem]">ここは、安心して語っていい場。</p>
            <p className="text-[1.1rem]">うまく話さなくていい。<br />まとまっていなくていい。</p>
            <p className="text-[1.1rem]">誰かに向けて語ってもいいし、<br />まだ誰も思い浮かばなくても大丈夫。</p>
            <p className="text-[1.1rem]">残すか、渡すかは、<br />今は決めなくて大丈夫。</p>
          </div>
          <div className="w-full max-w-xs pb-10"><button onClick={onNext} className="btn-glass w-full py-6 rounded-full text-[1.2rem] tracking-[0.3em] text-shadow-premium font-serif">はじめてみる</button></div>
        </div>
      );
    }

    function SoundCheckView({ onNext }) {
      const [status, setStatus] = useState('idle'); 
      const [testAudioUrl, setTestAudioUrl] = useState(null);
      const [isPlaying, setIsPlaying] = useState(false);
      const [volume, setVolume] = useState(0);
      const [error, setError] = useState(null);
      const recorderRef = useRef(null);
      const chunksRef = useRef([]);
      const audioObjRef = useRef(null);
      const animationFrameRef = useRef(null);
      const streamRef = useRef(null);

      const getSupportedMimeType = () => {
        const types = ['audio/webm', 'audio/mp4', 'audio/ogg', 'audio/wav'];
        for (const type of types) { if (MediaRecorder.isTypeSupported(type)) return type; }
        return '';
      };

      const startTest = async () => {
        try {
          setError(null);
          
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            throw new Error("NOT_SUPPORTED");
          }
          
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          streamRef.current = stream;
          const mimeType = getSupportedMimeType();
          const recorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
          recorderRef.current = recorder;
          chunksRef.current = [];

          const AudioCtxClass = window.AudioContext || window.webkitAudioContext;
          const audioCtx = new AudioCtxClass();
          if (audioCtx.state === 'suspended') await audioCtx.resume();
          
          const source = audioCtx.createMediaStreamSource(stream);
          const analyser = audioCtx.createAnalyser();
          analyser.fftSize = 256;
          source.connect(analyser);
          const dataArray = new Uint8Array(analyser.frequencyBinCount);
          
          const updateVolume = () => {
            analyser.getByteFrequencyData(dataArray);
            const average = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
            setVolume(average);
            animationFrameRef.current = requestAnimationFrame(updateVolume);
          };
          updateVolume();

          recorder.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
          recorder.onstop = () => {
            const blob = new Blob(chunksRef.current, { type: recorder.mimeType || 'audio/webm' });
            if (testAudioUrl) URL.revokeObjectURL(testAudioUrl);
            setTestAudioUrl(URL.createObjectURL(blob));
            cancelAnimationFrame(animationFrameRef.current);
            if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
            audioCtx.close();
          };

          recorder.start(100); setStatus('recording');
        } catch (e) {
          console.error("Mic access error:", e);
          if (e.message === "NOT_SUPPORTED") {
            setError("この環境ではマイク機能がサポートされていません。ブラウザの新しいタブで直接URLを開いてお試しください。");
          } else if (e.name === 'NotAllowedError' || e.message.includes('Permission')) {
            setError("マイクへのアクセスが許可されていません。ブラウザの設定からマイクの使用を許可してください。");
          } else if (e.name === 'NotFoundError') {
            setError("マイクが見つかりません。マイクが正しく接続されているか確認してください。");
          } else {
            setError(`マイクの準備中にエラーが発生しました。(${e.name})`);
          }
        }
      };

      const stopTest = () => { if (recorderRef.current && recorderRef.current.state === 'recording') recorderRef.current.stop(); setStatus('stopped'); };

      const playTest = () => {
        if (!testAudioUrl) return;
        if (isPlaying) { 
          if (audioObjRef.current) {
            audioObjRef.current.pause(); 
            audioObjRef.current.currentTime = 0;
          }
          setIsPlaying(false); 
        } else {
          try {
            const player = new Audio();
            player.src = testAudioUrl;
            player.onended = () => setIsPlaying(false);
            audioObjRef.current = player;
            player.play().then(() => {
              setIsPlaying(true);
            }).catch(err => {
              console.error(err);
              setIsPlaying(false);
            });
          } catch(e) { console.error(e); }
        }
      };

      return (
        <div className="h-full w-full flex flex-col items-center justify-center p-8 fade-in text-center space-y-10">
          <div className="space-y-4">
            <h2 className="text-2xl text-white font-bold tracking-wider font-serif">サウンドチェック</h2>
            <div className="text-white/70 text-[0.95rem] leading-relaxed space-y-4 font-serif">
              <p>あなたの声が届いているか確認しましょう。<br />いつもより、少しゆっくり、ハッキリ話してみてください。</p>
              <p className="text-white text-lg font-bold bg-white/5 py-3 rounded-2xl border border-white/10">「今日の天気はどうですか？」</p>
            </div>
          </div>
          <div className="relative w-56 h-56 flex items-center justify-center bg-white/5 rounded-full border border-white/10 shadow-inner">
            {status === 'recording' ? (
              <div className="mic-wave">
                {[...Array(7)].map((_, i) => (
                  <div key={i} className="mic-bar" style={{ height: `${Math.max(6, (volume * (0.5 + Math.random() * 1.5)))}px`, opacity: 0.3 + (volume / 100) }} />
                ))}
              </div>
            ) : (
              <div className="flex flex-col items-center gap-2">
                {status === 'idle' && <CustomIcon name="mic" size={56} className="text-white/10" />}
                {status === 'stopped' && <CustomIcon name="check" size={56} className="text-green-400" />}
              </div>
            )}
          </div>
          <div className="w-full max-w-xs space-y-4 pt-4 font-serif relative">
            {error && (
              <div className="absolute bottom-full mb-4 left-0 w-full bg-red-500/20 border border-red-500/50 rounded-lg p-3 text-red-200 text-xs font-serif leading-relaxed whitespace-pre-wrap">
                {error}
              </div>
            )}
            
            {status === 'idle' && <button onClick={startTest} className="btn-glass w-full py-5 rounded-full flex items-center justify-center gap-3 text-lg"><div className="w-3 h-3 bg-red-500 rounded-full animate-ping" />テスト録音を開始</button>}
            {status === 'recording' && <button onClick={stopTest} className="w-full py-5 rounded-full bg-white/20 border-2 border-white/60 font-bold font-serif">録音を終了する</button>}
            {status === 'stopped' && (
              <div className="space-y-4 fade-in font-serif">
                <button onClick={playTest} className="btn-glass w-full py-5 rounded-full flex items-center justify-center gap-3">
                  <CustomIcon name={isPlaying ? "pause" : "play"} size={20} />
                  {isPlaying ? "停止" : "声を再生して確認"}
                </button>
                <button onClick={onNext} className="w-full py-5 rounded-full bg-white text-slate-900 font-bold tracking-widest shadow-xl text-lg font-serif">準備完了。問いへ進む</button>
                <button onClick={() => { setStatus('idle'); setTestAudioUrl(null); setVolume(0); setIsPlaying(false); setError(null); }} className="text-white/40 text-sm underline pt-2 block w-full font-serif">もう一度録りなおす</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    function WeekStartView({ weekIdx, qIndex, onJump, onAnother, onNext, onFinishSpeak }) {
      const currentWeek = CONTENT.weeks[weekIdx];
      const questionText = currentWeek.questions[qIndex];

      return (
        <div className="h-full w-full flex flex-col px-8 py-12 fade-in">
          <header className="mb-8 text-center font-serif flex flex-col items-center gap-2">
            <div className="flex items-center gap-2">
              <select 
                className="custom-select font-serif text-[0.9rem] tracking-[0.2em]"
                value={`${weekIdx}-${qIndex}`}
                onChange={(e) => {
                  const [w, q] = e.target.value.split('-').map(Number);
                  onJump(w, q);
                }}
              >
                {CONTENT.weeks.map((w, wi) => (
                  w.questions.map((_, qi) => (
                    <option key={`${wi}-${qi}`} value={`${wi}-${qi}`}>
                      {wi < 4 ? `Week ${wi + 1}-${qi + 1}` : `閉じる前に`}
                    </option>
                  ))
                ))}
              </select>
            </div>
            <h2 className="text-[1.2rem] text-white/50 mt-2 font-normal">{currentWeek.theme}</h2>
          </header>
          
          <div className="flex-1 flex flex-col items-center justify-center space-y-10">
            <div className="card-stack w-full relative h-80">
              <div className="absolute inset-0 bg-white/5 translate-y-6 scale-95 opacity-10 rounded-[2.5rem]"></div>
              <div className="absolute inset-0 bg-white/10 translate-y-3 scale-[0.98] opacity-20 rounded-[2.5rem]"></div>
              <div className="absolute inset-0 bg-white/15 backdrop-blur-lg p-8 pt-4 flex flex-col items-center text-center border border-white/5 shadow-2xl rounded-[2.5rem] overflow-hidden">
                {weekIdx === 0 && (
                  <p className="text-white/60 font-serif text-[0.85rem] shrink-0">まずは一つだけ。3分ほど思い出してみましょう。</p>
                )}
                <div className="flex-1 flex items-center justify-center w-full">
                  <p className="text-white font-serif leading-relaxed whitespace-pre-wrap text-shadow-premium text-[1.4rem]">{questionText}</p>
                </div>
              </div>
            </div>
            <div className="flex flex-col items-center w-full gap-6">
              <div className="flex gap-4 w-full max-w-[400px] justify-center">
                <button onClick={onNext} className="btn-glass flex-1 py-5 rounded-full text-[1.1rem] tracking-[0.2em] shadow-xl font-serif">話してみる</button>
                {weekIdx === 4 && (
                  <button onClick={onFinishSpeak} className="btn-glass flex-1 py-5 rounded-full text-[1.1rem] tracking-[0.1em] shadow-xl font-serif bg-white/10 border-white/20">語りを終える</button>
                )}
              </div>
              <button onClick={onAnother} className="text-white/40 text-sm underline underline-offset-4 hover:text-white/70 transition-all font-serif">別の質問にする</button>
            </div>
          </div>
        </div>
      );
    }

    function RecordingView({ questionText, onComplete }) {
      const [status, setStatus] = useState('counting'); // counting, recording, paused, error
      const [countdown, setCountdown] = useState(3);
      const [elapsed, setElapsed] = useState(0);
      const [errorMsg, setErrorMsg] = useState(null);
      const transcriptRef = useRef(""); 
      const interimRef = useRef(""); 
      const mediaRecorderRef = useRef(null);
      const chunksRef = useRef([]);
      const recognitionRef = useRef(null);

      const getSupportedMimeType = () => {
        const types = ['audio/webm', 'audio/mp4', 'audio/ogg', 'audio/wav'];
        for (const type of types) { if (MediaRecorder.isTypeSupported(type)) return type; }
        return '';
      };

      useEffect(() => {
        if (status === 'counting') { if (countdown > 0) setTimeout(() => setCountdown(countdown - 1), 1000); else startRec(); }
      }, [status, countdown]);

      useEffect(() => {
        let timer; if (status === 'recording' && elapsed < 180) timer = setInterval(() => setElapsed(e => e + 1), 1000);
        return () => clearInterval(timer);
      }, [status, elapsed]);

      const startRec = async () => {
        try {
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            throw new Error("NOT_SUPPORTED");
          }
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const mimeType = getSupportedMimeType();
          const recorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
          chunksRef.current = [];
          recorder.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
          recorder.onstop = () => {
            const finalTranscript = (transcriptRef.current + " " + interimRef.current).trim();
            const blob = new Blob(chunksRef.current, { type: recorder.mimeType || 'audio/webm' });
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = () => {
              onComplete({ 
                transcriptText: finalTranscript, 
                audioBase64: reader.result.split(',')[1], 
                fullAudioDataUrl: reader.result 
              });
              stream.getTracks().forEach(t => t.stop());
            };
          };
          recorder.start(200); mediaRecorderRef.current = recorder; setStatus('recording');
          const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
          if (SpeechRec) {
            const rec = new SpeechRec(); rec.lang = 'ja-JP'; rec.continuous = true; rec.interimResults = true;
            rec.onresult = e => {
              let final = ""; let interim = "";
              for (let i = e.resultIndex; i < e.results.length; ++i) { if (e.results[i].isFinal) final += e.results[i][0].transcript; else interim += e.results[i][0].transcript; }
              if (final) transcriptRef.current += final; interimRef.current = interim;
            };
            rec.start(); recognitionRef.current = rec;
          }
        } catch (e) { 
          console.error("Recording start error", e);
          setStatus('error');
          if (e.message === "NOT_SUPPORTED") {
            setErrorMsg("この環境ではマイク機能がサポートされていません。");
          } else {
            setErrorMsg("マイクの起動に失敗しました。ブラウザのアクセス許可をご確認ください。");
          }
        }
      };

      const stopRec = () => { 
        if (recognitionRef.current) try { recognitionRef.current.stop(); } catch(e){} 
        setTimeout(() => { if (mediaRecorderRef.current) mediaRecorderRef.current.stop(); }, 1200); 
      };

      const circumference = 2 * Math.PI * 95;
      return (
        <div className="h-full w-full flex flex-col items-center justify-center p-10 fade-in bg-slate-800 font-serif">
          {status === 'counting' ? <div className="countdown-text font-serif text-white text-9xl">{countdown}</div> : 
           status === 'error' ? (
             <div className="text-center space-y-6">
                <CustomIcon name="alert-circle" size={48} className="text-red-400 mx-auto" />
                <p className="text-red-200">{errorMsg}</p>
                <button onClick={() => window.location.reload()} className="btn-glass px-6 py-2 rounded-full">リロードしてやり直す</button>
             </div>
           ) : (
            <div className="flex flex-col items-center space-y-16 w-full">
              <div className="text-center space-y-4">
                <h3 className="text-white/30 text-[0.8rem] tracking-[0.4em] uppercase font-serif">Recording</h3>
                <p className="text-white/90 font-serif text-[1.2rem] leading-relaxed px-4 text-shadow-premium">{questionText}</p>
              </div>
              <div className="relative w-64 h-64 flex items-center justify-center">
                <svg width="240" height="240" className="-rotate-90">
                  <circle cx="120" cy="120" r={95} stroke="rgba(255,255,255,0.02)" strokeWidth="1.5" fill="transparent" />
                  <circle cx="120" cy="120" r={95} stroke="rgba(255,255,255,0.15)" strokeWidth="1.5" fill="transparent" strokeDasharray={circumference} strokeDashoffset={circumference * (1 - (elapsed/180))} strokeLinecap="round" className="transition-all duration-1000 linear" />
                </svg>
                <div className="absolute opacity-5"><CustomIcon name="mic" size={32} /></div>
              </div>
              <div className="flex gap-12 items-center">
                <button onClick={stopRec} className="w-20 h-20 rounded-full bg-white text-stone-800 flex flex-col items-center justify-center shadow-xl active:scale-95 transition-all"><CustomIcon name="square" size={24} /><span className="text-[0.75rem] font-bold mt-1 font-serif">終了</span></button>
                <button onClick={() => { if(status === 'recording') { setStatus('paused'); mediaRecorderRef.current.pause(); } else { setStatus('recording'); mediaRecorderRef.current.resume(); } }} className="w-20 h-20 rounded-full bg-white/10 border border-white/20 text-white flex flex-col items-center justify-center active:scale-95 transition-all">
                  <CustomIcon name={status === 'recording' ? "pause" : "play"} size={24} /><span className="text-[0.75rem] font-bold mt-1 font-serif">{status === 'recording' ? "一時停止" : "再開"}</span>
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function ReviewView({ data, onBack, onSave }) {
      const [currentStep, setCurrentStep] = useState(1); 
      const [steps, setSteps] = useState({ step1: "", step2: "", tags: [], era: "", emotion: "" });
      const [loading, setLoading] = useState(true);
      const [isSaving, setIsSaving] = useState(false);
      const [isPlaying, setIsPlaying] = useState(false);
      const audioObj = useRef(null);

      useEffect(() => {
        const transcript = (data.transcriptText || "").trim();
        
        callGasApi('generateSteps', { transcript: transcript, audioBase64: data.audioBase64 })
          .then(res => {
            if (res.success) {
              try {
                const parsed = typeof res.data === 'string' ? JSON.parse(res.data) : res.data;
                if (parsed.error) throw new Error(parsed.error);
                setSteps({ 
                  step1: parsed.step1 || "", 
                  step2: parsed.step2 || "",
                  tags: parsed.tags || [],
                  era: parsed.era || "",
                  emotion: parsed.emotion || ""
                });
              } catch(e) {
                setSteps({ step1: res.data, step2: "", tags: [], era: "", emotion: "" });
              }
            } else {
              throw new Error(res.error);
            }
            setLoading(false);
          })
          .catch(err => {
            console.error(err);
            setSteps({ step1: "(エラーが発生しました。設定を見直してください)", step2: "", tags: [], era: "", emotion: "" });
            setLoading(false);
          });
      }, [data]);

      const togglePlay = () => {
        if (isPlaying) { 
          if (audioObj.current) { 
            audioObj.current.pause(); 
            audioObj.current.currentTime = 0; 
          } 
          setIsPlaying(false); 
        } else {
          try {
            const player = new Audio();
            player.src = data.fullAudioDataUrl;
            player.onended = () => setIsPlaying(false);
            audioObj.current = player;
            player.play().then(() => {
                setIsPlaying(true);
            }).catch(e => {
                console.error(e);
            });
          } catch(e) { console.error(e); }
        }
      };

      return (
        <div className="h-full w-full flex flex-col px-4 py-8 fade-in overflow-hidden bg-slate-900/40">
          <header className="flex mb-4 border-b border-white/5 font-serif">
            {[1, 2].map(s => (
              <button key={s} onClick={() => setCurrentStep(s)} className={`step-tab ${currentStep === s ? 'active' : ''}`}>Step {s}</button>
            ))}
          </header>
          
          {/* AIが推測したメタデータの表示 */}
          {!loading && (steps.era || steps.emotion || (steps.tags && steps.tags.length > 0)) && (
            <div className="flex flex-wrap gap-2 mb-4 px-2 fade-in">
              <CustomIcon name="tag" size={16} className="text-white/40 mt-1" />
              {steps.era && steps.era !== "不明" && (
                <span className="bg-white/10 text-white/80 text-xs px-3 py-1.5 rounded-full border border-white/5">{steps.era}</span>
              )}
              {steps.emotion && steps.emotion !== "不明" && (
                <span className="bg-white/10 text-white/80 text-xs px-3 py-1.5 rounded-full border border-white/5">{steps.emotion}</span>
              )}
              {steps.tags && steps.tags.map(t => (
                <span key={t} className="bg-white/10 text-white/80 text-xs px-3 py-1.5 rounded-full border border-white/5">#{t}</span>
              ))}
            </div>
          )}

          <div className="flex-1 bg-black/20 rounded-[2rem] border border-white/10 p-6 shadow-inner overflow-y-auto relative mb-6">
            {loading ? (
              <div className="absolute inset-0 flex flex-col items-center justify-center gap-4 font-serif">
                <CustomIcon name="loader-2" className="loader-spin text-white/40" size={32} />
                <p className="text-white/40 text-sm font-serif">言葉を編み、文脈を整理しています...</p>
              </div>
            ) : (
              <div className="font-serif leading-[2.2] text-white text-[1.1rem] whitespace-pre-wrap text-shadow-premium">
                {steps[`step${currentStep}`]}
              </div>
            )}
          </div>
          
          <div className="flex flex-col gap-4 px-2">
            <button onClick={() => { setIsSaving(true); onSave(steps, data.audioBase64, () => setIsSaving(false)); }} disabled={loading || isSaving} className="btn-glass w-full py-5 rounded-full text-[1.1rem] shadow-xl flex items-center justify-center gap-3 font-serif">
              {isSaving ? <CustomIcon name="loader-2" className="loader-spin" size={20} /> : "この内容で保存する"}
            </button>
            
            <div className="flex gap-4 font-serif">
              <button onClick={togglePlay} className="flex-1 py-3 text-white/70 text-[0.85rem] border border-white/10 rounded-full flex items-center justify-center gap-2 bg-white/5 active:bg-white/10 transition-colors font-serif">
                <CustomIcon name={isPlaying ? "square" : "play"} size={16} /><span>{isPlaying ? "停止" : "再生"}</span>
              </button>
              <button onClick={onBack} disabled={isSaving} className="flex-1 py-3 text-white/30 text-[0.85rem] text-center underline underline-offset-4 font-serif">やり直す</button>
            </div>
          </div>
        </div>
      );
    }

    function ThankYouView({ onFinish, onContinue }) {
      return (
        <div className="h-full w-full flex flex-col items-center justify-center p-10 fade-in bg-gradient-to-b from-[#1e293b] to-[#d97706]">
          <div className="text-center space-y-12">
            <h2 className="text-4xl text-white text-shadow-premium font-serif">ありがとうございます。</h2>
            <div className="flex flex-col gap-6 w-full max-w-xs mx-auto font-serif">
              <button onClick={onContinue} className="btn-glass py-6 rounded-full text-[1.2rem] font-serif">もう少し、語ってみる</button>
              <button onClick={onFinish} className="w-full py-2 text-white/40 text-[0.95rem] hover:text-white transition-all underline underline-offset-8 decoration-white/20 font-serif">今日はここまでにする</button>
            </div>
          </div>
        </div>
      );
    }

    function EpilogueView({ onHome }) {
      return (
        <div className="h-full w-full flex flex-col items-center justify-center p-12 fade-in bg-slate-900/60 text-center">
          <div className="flex-1 flex flex-col justify-center space-y-12 drop-shadow-xl">
            <div className="space-y-10 font-serif text-white/90 leading-[2.5] text-[1.1rem]">
              <p>ここまで、語ってくれてありがとうございました。</p>
              <p>
                語られた声や言葉は、<br />
                あなたの温度のまま、<br />
                ちゃんと、ここに残っています。
              </p>
              <p>
                また語りたくなったら、<br />
                いつでも、ここへ。
              </p>
              <p className="pt-4 text-white font-bold">おつかれさまでした。</p>
            </div>
          </div>
          <button 
            onClick={onHome} 
            className="text-white/30 text-[0.9rem] font-serif hover:text-white/60 transition-all underline underline-offset-8 decoration-white/10 pb-10"
          >
            ホームへ
          </button>
        </div>
      );
    }

    const startApp = () => {
      const container = document.getElementById('root');
      if (container) {
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
      }
    };
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', startApp);
    } else {
      startApp();
    }
  </script>
</body>
</html>
