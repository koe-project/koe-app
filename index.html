<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Koe - 声で綴る一ヶ月</title>
  
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      console.error("Global Error:", error || message);
    };
  </script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    body { 
      font-family: 'Noto Sans JP', sans-serif; 
      margin: 0; padding: 0; 
      background: linear-gradient(180deg, #1e293b 0%, #334155 35%, #475569 65%, #d97706 100%);
      height: 100vh; color: white; -webkit-font-smoothing: antialiased; overflow: hidden;
    }
    .font-serif { font-family: 'Noto Serif JP', serif; }
    .app-container { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 600px; margin: 0 auto; position: relative; }
    .text-shadow-premium { text-shadow: 0 2px 15px rgba(0,0,0,0.8), 0 1px 4px rgba(0,0,0,0.6); }
    .btn-glass {
      background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3); color: white; transition: all 0.4s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .btn-glass:active:not(:disabled) { transform: scale(0.96); background: rgba(255, 255, 255, 0.3); }
    .btn-glass:disabled { opacity: 0.6; cursor: not-allowed; }
    .fade-in { animation: fadeInEffect 1.2s ease-out forwards; }
    @keyframes fadeInEffect { from { opacity: 0; } to { opacity: 1; } }
    .loader-spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    
    .step-tab { flex: 1; padding: 12px 0; font-size: 0.9rem; text-align: center; border-bottom: 2px solid transparent; color: rgba(255,255,255,0.3); transition: all 0.3s ease; font-weight: 500; }
    .step-tab.active { color: white; border-bottom-color: white; font-weight: bold; }

    .custom-select {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px; padding: 2px 8px; color: white; outline: none; cursor: pointer;
    }
    .custom-select option { color: black; }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // ★ ここにGASでデプロイしたウェブアプリのURLを貼り付けます
    // ==========================================
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbx5ezIitjgUjqxuLZVk6RoYp2zY8RLimJp0qk5vrxbLC-qB4o56-796M81dUwXOSpJO/exec";

    const callGasApi = async (action, payload) => {
      if (!GAS_API_URL || GAS_API_URL.includes("ここに")) {
        console.warn("GAS_API_URLが設定されていないため、デモモードで動作します。");
        return new Promise((resolve) => {
          setTimeout(() => {
            if (action === 'generateSteps') {
              resolve({
                success: true,
                data: {
                  step1: "【デモモード】\n" + (payload.transcript || "（音声が入力されませんでした）") + "、ですね。",
                  step2: "【デモモード】\n本番環境でGASのURLを設定すると、ここにAIによる美しい整形テキストが表示されます。",
                  tags: ["家族", "思い出"], era: "20代", emotion: "穏やか"
                }
              });
            } else if (action === 'saveAnswer') { resolve({ success: true }); } 
            else { resolve({ success: false, error: 'Unknown action' }); }
          }, 1500);
        });
      }
      
      const response = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: action, ...payload })
      });
      if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
      return await response.json();
    };

    // ==========================================
    // ▼▼▼ コンテンツデータ（ヒント対応版） ▼▼▼
    // ==========================================
    const CONTENT = {
      test: {
        theme: "サウンドチェック",
        questions: [
          { 
            text: "あなたの声が届いているか確認しましょう。\n今日の天気はどうですか？", 
            hint: "💡天候や気温、快適さなど、感じたまま話してみて" 
          }
        ]
      },
      weeks: [
        { 
          number: 1, title: "Week 1", theme: "思い出すって、悪くない", 
          questions: [ 
            { text: "人生で一番おいしかった旅行のご飯は何でしたか？\nその時の場面も教えてください。", hint: "💡まずは一つだけ。3分ほど思い出してみましょう。" }, 
            { text: "子供の頃、よくやっていた遊びや、よく行っていた場所はどこでしたか？" }, 
            { text: "振り返ると、楽しかったなと思える時期はいつ頃ですか？" }, 
            { text: "子供の頃に住んでいた家について、どんな思い出がありますか？" }, 
            { text: "昔よく聴いていた音楽や、印象に残っている曲はありますか？" }, 
            { text: "昔は当たり前だったけれど、今は少し懐かしく感じる習慣はありますか？" } 
          ] 
        },
        { 
          number: 2, title: "Week 2", theme: "頑張ってきた時間を、言葉にする", 
          questions: [ 
            { text: "これまでの人生で、一番大変だった時期はいつ頃でしたか？\nその頃のことを、少し思い出せる範囲で教えてください。" }, 
            { text: "その「大変だった時期」を思い出すと、当時の自分は、どんな気持ちで日々を過ごしていたと思いますか？" }, 
            { text: "それでも「大変だった時期」を乗り越えられた理由は何だったと思いますか？" }, 
            { text: "仕事や役割を続ける中で、大事にしてきた考え方や癖はありますか？" }, 
            { text: "あまり言葉にしてこなかったけれど、今振り返ると「自分なりに頑張っていたな」と思うことはありますか？" }, 
            { text: "これまでの人生で、「よくやっていたな」と思える頃の自分に、今ならどんな言葉をかけてあげたいですか？" } 
          ] 
        },
        { 
          number: 3, title: "Week 3", theme: "言わなかったことに、触れてみる", 
          questions: [ 
            { text: "家族との思い出で、今でもよく覚えている場面はありますか？" }, 
            { text: "ご自身の親について、子供たちにあまり話してこなかった思い出はありますか？" }, 
            { text: "子供が生まれた時のこと、\n正直どんな気持ちでしたか？" }, 
            { text: "家族に、これまで言葉にしてこなかった想いはありますか？" }, 
            { text: "今だから言える、家族への感謝や本音があれば教えてください。" }, 
            { text: "今振り返ってみて、「これでよかった」と思える家族との関わり方はありますか？" } 
          ] 
        },
        { 
          number: 4, title: "Week 4", theme: "未来へ、手渡す", 
          questions: [ 
            { text: "人生で「これは大事にしてきた」と言えるものは何ですか？" }, 
            { text: "振り返ると、「あの選択はよくやったな」と思えることはありますか？" }, 
            { text: "昔は「失敗した」とか「恥ずかしい」と思っていたけれど、今振り返ると、少し笑って話せる出来事はありますか？" }, 
            { text: "子供たちに、今すぐ理解されなくてもいいから、いつか伝わってほしいことは何ですか？" }, 
            { text: "家族が困ったとき、思い出してほしい自分の姿はありますか？" }, 
            { text: "いつか家族がこの言葉を読むとしたら、そのとき、どんな気持ちでいてくれたら嬉しいですか？" } 
          ] 
        },
        { 
          number: 5, title: "", theme: "この時間を閉じる前に", 
          questions: [ 
            { text: "語りきれなかったことがあれば、自由にお話しください。\nどんなテーマでも、今の気持ちのままに。" } 
          ] 
        }
      ]
    };

    const CustomIcon = ({ name, size = 24, className = "" }) => {
      const paths = {
        'mic': <><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" x2="12" y1="19" y2="22"/></>,
        'square': <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>,
        'play': <polygon points="5 3 19 12 5 21 5 3"/>,
        'pause': <><rect width="4" height="16" x="6" y="4"/><rect width="4" height="16" x="14" y="4"/></>,
        'chevron-down': <path d="m6 9 6 6 6-6"/>,
        'loader-2': <path d="M21 12a9 9 0 1 1-6.219-8.56"/>,
        'check': <path d="M20 6 9 17l-5-5"/>,
        'alert-circle': <><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></>,
        'tag': <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" />,
        'pencil': <><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></>
      };
      return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{paths[name] || null}</svg>;
    };

    // ==========================================
    // ▼▼▼ メインAppコンポーネント ▼▼▼
    // ==========================================
    function App() {
      const [view, setView] = useState('top'); 
      const [weekIdx, setWeekIdx] = useState(0); // -1 はテストモード
      const [qIndex, setQIndex] = useState(0); 
      const [currentData, setCurrentData] = useState(null); 

      const handleNextQuestion = () => {
        let nq = qIndex + 1; let nw = weekIdx;
        if (nq >= CONTENT.weeks[nw].questions.length) { nq = 0; nw = (nw + 1) % CONTENT.weeks.length; }
        setWeekIdx(nw); setQIndex(nq);
      };

      const handleJump = (w, q) => { setWeekIdx(w); setQIndex(q); };

      const handleSave = (ansData, audioBase64, callback) => {
        const payload = { data: { ...ansData, audioBase64: audioBase64, questionId: weekIdx < 4 ? `Week ${weekIdx + 1}-${qIndex + 1}` : `Final-${qIndex + 1}`, weekNumber: weekIdx + 1 } };
        const onComplete = () => { if (weekIdx === 4) setView('epilogue'); else setView('thank_you'); if (callback) callback(); };

        callGasApi('saveAnswer', payload).then(res => {
          if (res.success) onComplete();
          else { alert("保存に失敗しました: " + res.error); if(callback) callback(); }
        }).catch(err => {
          alert("通信エラーが発生しました。"); if(callback) callback();
        });
      };

      return (
        <div className="app-container font-serif">
          {view === 'top' && <TopView onNext={() => setView('intro')} />}
          {view === 'intro' && <IntroView onNext={() => { setWeekIdx(-1); setQIndex(0); setView('week_start'); }} />}
          {view === 'week_start' && <WeekStartView weekIdx={weekIdx} qIndex={qIndex} onJump={handleJump} onAnother={handleNextQuestion} onNext={() => setView('recording')} onFinishSpeak={() => setView('epilogue')} />}
          {view === 'recording' && <RecordingView question={weekIdx === -1 ? CONTENT.test.questions[qIndex] : CONTENT.weeks[weekIdx].questions[qIndex]} onComplete={(recordingData) => { setCurrentData(recordingData); setView('review'); }} />}
          {view === 'review' && <ReviewView data={currentData} isTestMode={weekIdx === -1} onTestComplete={() => { setWeekIdx(0); setQIndex(0); setView('week_start'); }} onBack={() => setView('week_start')} onSave={handleSave} />}
          {view === 'thank_you' && <ThankYouView onFinish={() => { setWeekIdx(0); setQIndex(0); setView('top'); }} onContinue={() => { handleNextQuestion(); setView('week_start'); }} />}
          {view === 'epilogue' && <EpilogueView onHome={() => { setWeekIdx(0); setQIndex(0); setView('top'); }} />}
        </div>
      );
    }

    // ==========================================
    // ▼▼▼ トップ画面 ▼▼▼
    // ==========================================
    function TopView({ onNext }) {
      return (
        <div className="h-full w-full flex flex-col justify-between items-center py-20 px-10 fade-in">
          <div className="flex flex-col items-center pt-10 w-full max-w-[300px]">
            <h1 className="text-8xl tracking-[0.1em] text-white text-shadow-premium lowercase font-serif">koe</h1>
            <p className="text-white font-serif tracking-[0.15em] text-[1.1rem] text-shadow-premium leading-relaxed text-center mt-6">1ヶ月の回想体験。<br />語るだけ。残る。</p>
            <div className="h-px w-full bg-gradient-to-r from-transparent via-white/40 to-transparent mt-6"></div>
          </div>
          <button onClick={onNext} className="animate-bounce flex flex-col items-center gap-2 text-white/50 hover:text-white transition-all"><CustomIcon name="chevron-down" size={40} /></button>
        </div>
      );
    }

    // ==========================================
    // ▼▼▼ イントロ画面 ▼▼▼
    // ==========================================
    function IntroView({ onNext }) {
      return (
        <div className="h-full w-full flex flex-col justify-between items-center py-16 px-10 fade-in text-center">
          <div className="space-y-10 flex-1 flex flex-col justify-center text-shadow-premium">
            <p className="text-[1.1rem]">ここは、安心して語っていい場。</p>
            <p className="text-[1.1rem]">うまく話さなくていい。<br />まとまっていなくていい。</p>
            <p className="text-[1.1rem]">誰かに向けて語ってもいいし、<br />まだ誰も思い浮かばなくても大丈夫。</p>
            <p className="text-[1.1rem]">残すか、渡すかは、<br />今は決めなくて大丈夫。</p>
          </div>
          <div className="w-full max-w-xs pb-10"><button onClick={onNext} className="btn-glass w-full py-6 rounded-full text-[1.2rem] tracking-[0.3em] text-shadow-premium font-serif">はじめてみる</button></div>
        </div>
      );
    }

    // ==========================================
    // ▼▼▼ 質問スタート画面 ▼▼▼
    // ==========================================
    function WeekStartView({ weekIdx, qIndex, onJump, onAnother, onNext, onFinishSpeak }) {
      const isTestMode = weekIdx === -1;
      const currentWeek = isTestMode ? CONTENT.test : CONTENT.weeks[weekIdx];
      const currentQuestion = currentWeek.questions[qIndex];

      return (
        <div className="h-full w-full flex flex-col px-8 py-12 fade-in">
          <header className="mb-8 text-center font-serif flex flex-col items-center gap-2">
            {!isTestMode && (
              <select className="custom-select font-serif text-[0.9rem] tracking-[0.2em]" value={`${weekIdx}-${qIndex}`} onChange={(e) => { const [w, q] = e.target.value.split('-').map(Number); onJump(w, q); }}>
                {CONTENT.weeks.map((w, wi) => w.questions.map((_, qi) => <option key={`${wi}-${qi}`} value={`${wi}-${qi}`}>{wi < 4 ? `Week ${wi + 1}-${qi + 1}` : `閉じる前に`}</option>))}
              </select>
            )}
            <h2 className="text-[1.2rem] text-white/50 mt-2 font-normal">{currentWeek.theme}</h2>
          </header>
          <div className="flex-1 flex flex-col items-center justify-center space-y-10">
            <div className="card-stack w-full relative h-80">
              <div className="absolute inset-0 bg-white/5 translate-y-6 scale-95 opacity-10 rounded-[2.5rem]"></div>
              <div className="absolute inset-0 bg-white/10 translate-y-3 scale-[0.98] opacity-20 rounded-[2.5rem]"></div>
              <div className="absolute inset-0 bg-white/15 backdrop-blur-lg p-8 pt-4 flex flex-col items-center justify-center text-center border border-white/5 shadow-2xl rounded-[2.5rem] overflow-hidden gap-6">
                <div className="w-full">
                  <p className="text-white font-serif leading-relaxed whitespace-pre-wrap text-shadow-premium text-[1.4rem]">{currentQuestion.text}</p>
                  {currentQuestion.hint && (
                    <p className="text-white/60 font-serif text-[0.85rem] mt-6 leading-relaxed">{currentQuestion.hint}</p>
                  )}
                </div>
              </div>
            </div>
            <div className="flex flex-col items-center w-full gap-6">
              <div className="flex gap-4 w-full max-w-[400px] justify-center">
                <button onClick={onNext} className="btn-glass flex-1 py-5 rounded-full text-[1.1rem] tracking-[0.2em] shadow-xl font-serif">
                  {isTestMode ? "テスト録音へ" : "話してみる"}
                </button>
                {!isTestMode && weekIdx === 4 && <button onClick={onFinishSpeak} className="btn-glass flex-1 py-5 rounded-full text-[1.1rem] tracking-[0.1em] shadow-xl font-serif bg-white/10 border-white/20">語りを終える</button>}
              </div>
              {!isTestMode && <button onClick={onAnother} className="text-white/40 text-sm underline underline-offset-4 hover:text-white/70 transition-all font-serif">別の質問にする</button>}
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // ▼▼▼ 録音画面（カウントダウン・音付き） ▼▼▼
    // ==========================================
    function RecordingView({ question, onComplete }) {
      const [status, setStatus] = useState('counting');
      const [countdown, setCountdown] = useState(3);
      const [elapsed, setElapsed] = useState(0);
      const [errorMsg, setErrorMsg] = useState(null);
      const transcriptRef = useRef(""); const interimRef = useRef("");
      const mediaRecorderRef = useRef(null); const chunksRef = useRef([]); const recognitionRef = useRef(null);

      const getSupportedMimeType = () => { const types = ['audio/webm', 'audio/mp4', 'audio/ogg', 'audio/wav']; for (const type of types) { if (MediaRecorder.isTypeSupported(type)) return type; } return ''; };

      // ▼ 穏やかな電子音を鳴らす関数
      const playBeep = (isStart = false) => {
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          const ctx = new AudioContext();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          
          osc.type = 'sine';
          if (isStart) {
            osc.frequency.setValueAtTime(880, ctx.currentTime); // 録音開始時（ポーン）
            gain.gain.setValueAtTime(0, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.8);
          } else {
            osc.frequency.setValueAtTime(660, ctx.currentTime); // 3,2,1のカウント時（ポッ）
            gain.gain.setValueAtTime(0, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.5);
          }
          osc.connect(gain);
          gain.connect(ctx.destination);
        } catch(e) { console.error("Audio beep error:", e); }
      };

      useEffect(() => { 
        if (status === 'counting') { 
          if (countdown > 0) {
            playBeep(false);
            setTimeout(() => setCountdown(countdown - 1), 1000); 
          } else { 
            playBeep(true);
            startRec(); 
          } 
        } 
      }, [status, countdown]);

      useEffect(() => { let timer; if (status === 'recording' && elapsed < 180) timer = setInterval(() => setElapsed(e => e + 1), 1000); return () => clearInterval(timer); }, [status, elapsed]);

      const startRec = async () => {
        try {
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error("NOT_SUPPORTED");
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const mimeType = getSupportedMimeType();
          const recorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
          chunksRef.current = [];
          recorder.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
          recorder.onstop = () => {
            const finalTranscript = (transcriptRef.current + " " + interimRef.current).trim();
            const blob = new Blob(chunksRef.current, { type: recorder.mimeType || 'audio/webm' });
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = () => {
              onComplete({ transcriptText: finalTranscript, audioBase64: reader.result.split(',')[1], fullAudioDataUrl: reader.result });
              stream.getTracks().forEach(t => t.stop());
            };
          };
          recorder.start(200); mediaRecorderRef.current = recorder; setStatus('recording');
          const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
          if (SpeechRec) {
            const rec = new SpeechRec(); rec.lang = 'ja-JP'; rec.continuous = true; rec.interimResults = true;
            rec.onresult = e => {
              let final = ""; let interim = "";
              for (let i = e.resultIndex; i < e.results.length; ++i) { if (e.results[i].isFinal) final += e.results[i][0].transcript; else interim += e.results[i][0].transcript; }
              if (final) transcriptRef.current += final; interimRef.current = interim;
            };
            rec.start(); recognitionRef.current = rec;
          }
        } catch (e) { 
          setStatus('error');
          if (e.message === "NOT_SUPPORTED") setErrorMsg("この環境ではマイク機能がサポートされていません。"); else setErrorMsg("マイクの起動に失敗しました。ブラウザのアクセス許可をご確認ください。");
        }
      };

      const stopRec = () => { if (recognitionRef.current) try { recognitionRef.current.stop(); } catch(e){} setTimeout(() => { if (mediaRecorderRef.current) mediaRecorderRef.current.stop(); }, 1200); };

      const circumference = 2 * Math.PI * 95;
      return (
        <div className="h-full w-full flex flex-col items-center justify-center p-10 fade-in bg-slate-800 font-serif">
          {status === 'error' ? (
             <div className="text-center space-y-6"><CustomIcon name="alert-circle" size={48} className="text-red-400 mx-auto" /><p className="text-red-200">{errorMsg}</p><button onClick={() => window.location.reload()} className="btn-glass px-6 py-2 rounded-full">リロードしてやり直す</button></div>
           ) : (
            <div className="flex flex-col items-center space-y-16 w-full">
              
              {/* ▼ 質問文とヒント（カウントダウン中も常に表示） ▼ */}
              <div className="text-center space-y-4">
                <h3 className="text-white/30 text-[0.8rem] tracking-[0.4em] uppercase font-serif">
                  {status === 'counting' ? 'Get Ready' : 'Recording'}
                </h3>
                <p className="text-white/90 font-serif text-[1.2rem] leading-relaxed px-4 text-shadow-premium">{question.text}</p>
                {question.hint && <p className="text-white/50 font-serif text-[0.8rem] mt-2">{question.hint}</p>}
              </div>

              {/* ▼ アニメーション領域（カウントダウンとマイクアイコンが切り替わる） ▼ */}
              <div className="relative w-64 h-64 flex items-center justify-center">
                <svg width="240" height="240" className="-rotate-90">
                  <circle cx="120" cy="120" r={95} stroke="rgba(255,255,255,0.02)" strokeWidth="1.5" fill="transparent" />
                  {(status === 'recording' || status === 'paused') && <circle cx="120" cy="120" r={95} stroke="rgba(255,255,255,0.15)" strokeWidth="1.5" fill="transparent" strokeDasharray={circumference} strokeDashoffset={circumference * (1 - (elapsed/180))} strokeLinecap="round" className="transition-all duration-1000 linear" />}
                </svg>
                <div className="absolute flex items-center justify-center">
                  {status === 'counting' ? (
                     <span key={countdown} className="font-serif text-white text-8xl fade-in opacity-80">{countdown}</span>
                  ) : (
                     <div className="opacity-5"><CustomIcon name="mic" size={32} /></div>
                  )}
                </div>
              </div>

              {/* ▼ ボトムボタン（カウントダウン中は透明化して押せなくする） ▼ */}
              <div className={`flex gap-12 items-center transition-opacity duration-500 ${status === 'counting' ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
                <button onClick={stopRec} className="w-20 h-20 rounded-full bg-white text-stone-800 flex flex-col items-center justify-center shadow-xl active:scale-95 transition-all"><CustomIcon name="square" size={24} /><span className="text-[0.75rem] font-bold mt-1 font-serif">終了</span></button>
                <button onClick={() => { if(status === 'recording') { setStatus('paused'); mediaRecorderRef.current.pause(); } else { setStatus('recording'); mediaRecorderRef.current.resume(); } }} className="w-20 h-20 rounded-full bg-white/10 border border-white/20 text-white flex flex-col items-center justify-center active:scale-95 transition-all">
                  <CustomIcon name={status === 'recording' ? "pause" : "play"} size={24} /><span className="text-[0.75rem] font-bold mt-1 font-serif">{status === 'recording' ? "一時停止" : "再開"}</span>
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // ▼▼▼ レビュー画面（文章整形＆編集機能） ▼▼▼
    // ==========================================
    function ReviewView({ data, isTestMode, onTestComplete, onBack, onSave }) {
      const [currentStep, setCurrentStep] = useState(1); 
      const [steps, setSteps] = useState({ step1: "", step2: "", tags: [], era: "", emotion: "" });
      const [loading, setLoading] = useState(true);
      const [isSaving, setIsSaving] = useState(false);
      const [isPlaying, setIsPlaying] = useState(false);
      const audioObj = useRef(null);

      const [isEditing, setIsEditing] = useState(false);
      const [editTempText, setEditTempText] = useState("");

      useEffect(() => {
        const transcript = (data.transcriptText || "").trim();
        callGasApi('generateSteps', { transcript: transcript, audioBase64: data.audioBase64 })
          .then(res => {
            if (res.success) {
              try {
                const parsed = typeof res.data === 'string' ? JSON.parse(res.data) : res.data;
                if (parsed.error) throw new Error(parsed.error);
                setSteps({ step1: parsed.step1 || "", step2: parsed.step2 || "", tags: parsed.tags || [], era: parsed.era || "", emotion: parsed.emotion || "" });
              } catch(e) { setSteps({ step1: res.data, step2: "", tags: [], era: "", emotion: "" }); }
            } else { throw new Error(res.error); }
            setLoading(false);
          })
          .catch(err => { setSteps({ step1: "(エラーが発生しました。設定を見直してください)", step2: "", tags: [], era: "", emotion: "" }); setLoading(false); });
      }, [data]);

      const togglePlay = () => {
        if (isPlaying) { if (audioObj.current) { audioObj.current.pause(); audioObj.current.currentTime = 0; } setIsPlaying(false); } 
        else {
          try {
            const player = new Audio(); player.src = data.fullAudioDataUrl; player.onended = () => setIsPlaying(false);
            audioObj.current = player;
            player.play().then(() => setIsPlaying(true)).catch(e => console.error(e));
          } catch(e) {}
        }
      };

      const handleTabChange = (step) => {
        if (isEditing) { setSteps(prev => ({ ...prev, [`step${currentStep}`]: editTempText })); setIsEditing(false); }
        setCurrentStep(step);
      };

      const startEditing = () => { setEditTempText(steps[`step${currentStep}`]); setIsEditing(true); };
      const saveEdit = () => { setSteps(prev => ({ ...prev, [`step${currentStep}`]: editTempText })); setIsEditing(false); };
      const cancelEdit = () => { setIsEditing(false); };

      return (
        <div className="h-full w-full flex flex-col px-4 py-8 fade-in overflow-hidden bg-slate-900/40">
          <header className="flex mb-4 border-b border-white/5 font-serif">
            {[1, 2].map(s => (
              <button key={s} onClick={() => handleTabChange(s)} className={`step-tab ${currentStep === s ? 'active' : ''}`}>Step {s}</button>
            ))}
          </header>
          
          {!loading && (steps.era || steps.emotion || (steps.tags && steps.tags.length > 0)) && (
            <div className="flex flex-wrap gap-2 mb-4 px-2 fade-in">
              <CustomIcon name="tag" size={16} className="text-white/40 mt-1" />
              {steps.era && steps.era !== "不明" && <span className="bg-white/10 text-white/80 text-xs px-3 py-1.5 rounded-full border border-white/5">{steps.era}</span>}
              {steps.emotion && steps.emotion !== "不明" && <span className="bg-white/10 text-white/80 text-xs px-3 py-1.5 rounded-full border border-white/5">{steps.emotion}</span>}
              {steps.tags && steps.tags.map(t => <span key={t} className="bg-white/10 text-white/80 text-xs px-3 py-1.5 rounded-full border border-white/5">#{t}</span>)}
            </div>
          )}

          <div className={`flex-1 rounded-[2rem] border border-white/10 p-6 shadow-inner overflow-y-auto relative mb-6 transition-colors ${isEditing ? 'bg-white/10' : 'bg-black/20'}`}>
            {loading ? (
              <div className="absolute inset-0 flex flex-col items-center justify-center gap-4 font-serif">
                <CustomIcon name="loader-2" className="loader-spin text-white/40" size={32} />
                <p className="text-white/40 text-sm font-serif">言葉を編み、文脈を整理しています...</p>
              </div>
            ) : (
              isEditing ? (
                <textarea value={editTempText} onChange={(e) => setEditTempText(e.target.value)} className="w-full h-full bg-transparent text-white font-serif text-[1.1rem] leading-[2.2] outline-none resize-none" autoFocus />
              ) : (
                <div className="font-serif leading-[2.2] text-white text-[1.1rem] whitespace-pre-wrap text-shadow-premium pb-10 clearfix">
                  <button onClick={startEditing} className="float-right ml-4 mb-2 bg-white/10 p-3 rounded-full text-white/70 hover:text-white hover:bg-white/20 transition-all shadow-lg backdrop-blur-md"><CustomIcon name="pencil" size={18} /></button>
                  {steps[`step${currentStep}`]}
                </div>
              )
            )}
          </div>
          
          <div className="flex flex-col gap-4 px-2">
            {isEditing ? (
              <div className="flex gap-4 font-serif fade-in">
                <button onClick={cancelEdit} className="flex-1 py-4 text-white/60 text-[1rem] border border-white/20 rounded-full bg-white/5 active:bg-white/10 transition-colors font-serif">キャンセル</button>
                <button onClick={saveEdit} className="flex-1 py-4 text-white text-[1rem] border border-white/50 rounded-full bg-white/20 active:bg-white/30 transition-colors font-serif flex items-center justify-center gap-2">
                  <CustomIcon name="check" size={18} />修正を完了する
                </button>
              </div>
            ) : (
              <div className="flex flex-col gap-4 fade-in">
                {isTestMode ? (
                  <button onClick={onTestComplete} className="w-full py-5 rounded-full bg-white text-slate-900 font-bold tracking-widest shadow-xl text-lg font-serif">準備完了。本番の問いへ進む</button>
                ) : (
                  <button onClick={() => { setIsSaving(true); onSave(steps, data.audioBase64, () => setIsSaving(false)); }} disabled={loading || isSaving} className="btn-glass w-full py-5 rounded-full text-[1.1rem] shadow-xl flex items-center justify-center gap-3 font-serif">
                    {isSaving ? <CustomIcon name="loader-2" className="loader-spin" size={20} /> : "この内容で保存する"}
                  </button>
                )}
                
                <div className="flex gap-4 font-serif">
                  <button onClick={togglePlay} className="flex-1 py-3 text-white/70 text-[0.85rem] border border-white/10 rounded-full flex items-center justify-center gap-2 bg-white/5 active:bg-white/10 transition-colors font-serif">
                    <CustomIcon name={isPlaying ? "square" : "play"} size={16} /><span>{isPlaying ? "停止" : "再生"}</span>
                  </button>
                  <button onClick={onBack} disabled={isSaving} className="flex-1 py-3 text-white/30 text-[0.85rem] text-center underline underline-offset-4 font-serif">やり直す</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    // ▼▼▼ サンキュー画面 ▼▼▼
    // ==========================================
    function ThankYouView({ onFinish, onContinue }) {
      return (
        <div className="h-full w-full flex flex-col items-center justify-center p-10 fade-in bg-gradient-to-b from-[#1e293b] to-[#d97706]">
          <div className="text-center space-y-12">
            <h2 className="text-4xl text-white text-shadow-premium font-serif">ありがとうございます。</h2>
            <div className="flex flex-col gap-6 w-full max-w-xs mx-auto font-serif">
              <button onClick={onContinue} className="btn-glass py-6 rounded-full text-[1.2rem] font-serif">もう少し、語ってみる</button>
              <button onClick={onFinish} className="w-full py-2 text-white/40 text-[0.95rem] hover:text-white transition-all underline underline-offset-8 decoration-white/20 font-serif">今日はここまでにする</button>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // ▼▼▼ エピローグ画面 ▼▼▼
    // ==========================================
    function EpilogueView({ onHome }) {
      return (
        <div className="h-full w-full flex flex-col items-center justify-center p-12 fade-in bg-slate-900/60 text-center">
          <div className="flex-1 flex flex-col justify-center space-y-12 drop-shadow-xl">
            <div className="space-y-10 font-serif text-white/90 leading-[2.5] text-[1.1rem]">
              <p>ここまで、語ってくれてありがとうございました。</p>
              <p>語られた声や言葉は、<br />あなたの温度のまま、<br />ちゃんと、ここに残っています。</p>
              <p>また語りたくなったら、<br />いつでも、ここへ。</p>
              <p className="pt-4 text-white font-bold">おつかれさまでした。</p>
            </div>
          </div>
          <button onClick={onHome} className="text-white/30 text-[0.9rem] font-serif hover:text-white/60 transition-all underline underline-offset-8 decoration-white/10 pb-10">ホームへ</button>
        </div>
      );
    }

    const startApp = () => { const container = document.getElementById('root'); if (container) { const root = ReactDOM.createRoot(container); root.render(<App />); } };
    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', startApp); } else { startApp(); }
  </script>
</body>
</html>
