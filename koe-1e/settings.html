<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Koe - 物語の設定</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Noto Serif JP', serif;
      background: #0f172a;
      color: #f8fafc;
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }

    .glass-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 18px;
    }

    .btn-quiet {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.12);
      transition: all .3s ease;
    }

    .btn-quiet:hover {
      background: rgba(255,255,255,.08);
    }

    .quiet-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,.18);
      color: white;
      padding: 10px 0;
      outline: none;
      font-size: 16px;
    }
    input[type="time"].quiet-input {
      color: #f8fafc;
      background-color: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px;
      padding: 14px;
    }

    input[type="time"].quiet-input::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: .6;
    }

    .quiet-select {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.12);
      color: white;
      padding: 14px;
      border-radius: 12px;
      outline: none;
    }

    .quiet-select option {
      background: #0f172a;
      color: white;
    }

    .fade-enter {
      animation: fadeIn .8s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

const SUPABASE_URL =
  "https://wquxjeqkumossjxehdop.supabase.co";

const SUPABASE_ANON_KEY =
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndxdXhqZXFrdW1vc3NqeGVoZG9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTEyMjksImV4cCI6MjA5MjU4NzIyOX0.wImRfRH2cr-w1uh2_c3vSS0_t4pHDeRWmWHZre1WbT4";

const supabaseClient =
  window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

function App() {

  const [loading, setLoading] = useState(true);

  const [saving, setSaving] = useState(false);

  const [user, setUser] = useState(null);

  const [profile, setProfile] = useState({
    name: "",
    email: ""
  });

  const [pref, setPref] = useState({
    email_enabled: true,
    weekday: 0,
    hour: 20
  });

  useEffect(() => {
    init();
  }, []);

  async function init() {

    try {

      const {
        data: { session }
      } = await supabaseClient.auth.getSession();

      if (!session) {
        location.href = "v1.html";
        return;
      }

      const userId = session.user.id;

      setUser(session.user);

      // profile

      const {
        data: profileData
      } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", userId)
        .maybeSingle();
      
       setProfile({
         name: profileData?.name || "",
         email: profileData?.email || session.user.email || ""
        });
      }

      // notification preferences

      const {
        data: prefData
      } = await supabaseClient
        .from("notification_preferences")
        .select("*")
        .eq("user_id", userId)
        .maybeSingle();

      if (prefData) {
        setPref({
          email_enabled: prefData.email_enabled ?? true,
          weekday: prefData.weekday ?? 0,
          hour: prefData.hour ?? 20
        });
      }

    } catch (e) {

      console.error(e);
      alert("設定の読み込みに失敗しました");

    } finally {

      setLoading(false);
    }
  }

  async function saveSettings() {

    try {

      setSaving(true);

      // profile update

      const { error: profileError } =
        await supabaseClient
          .from("profiles")
          .update({
            name: profile.name
          })
          .eq("id", user.id);

      if (profileError) {
        throw profileError;
      }

      // notification update

      const { error: prefError } =
        await supabaseClient
          .from("notification_preferences")
          .upsert({
            user_id: user.id,
            email_enabled: pref.email_enabled,
            line_enabled: false,
            weekday: pref.weekday,
            hour: pref.hour,
            timezone: "Asia/Tokyo",
            delivery_channel: "email"
          });

      if (prefError) {
        throw prefError;
      }

      alert("保存しました");

    } catch (e) {

      console.error(e);
      alert("保存に失敗しました");

    } finally {

      setSaving(false);
    }
  }

  if (loading) {
    return (
      <div className="h-screen flex items-center justify-center">
        <p className="text-white/30">
          読み込んでいます...
        </p>
      </div>
    );
  }

  const weekdays = [
    "日",
    "月",
    "火",
    "水",
    "木",
    "金",
    "土"
  ];

  const timeOptions = [];

  for (let h = 5; h <= 23; h++) {
    timeOptions.push(`${String(h).padStart(2, "0")}:00`);
    timeOptions.push(`${String(h).padStart(2, "0")}:30`);
  }

  return (
    <div className="min-h-screen fade-enter">

      <div className="max-w-2xl mx-auto px-6 py-10">

        <button
          onClick={() => location.href = "mypage.html"}
          className="text-white/35 hover:text-white/70 text-sm mb-12 transition-colors"
        >
          ← 本棚に戻る
        </button>

        <div className="mb-14">
          <h1 className="text-2xl text-white/90 mb-3">
            物語の設定
          </h1>

          <p className="text-white/35 text-sm leading-loose">
            この物語の届け方を整えます
          </p>
        </div>

        <div className="space-y-8">

          <div className="glass-card p-6">

            <h2 className="text-white/75 text-sm tracking-widest mb-8">
              この物語の持ち主
            </h2>

            <div className="space-y-8">

              <div>
                <p className="text-white/40 text-xs mb-3">
                  お名前
                </p>

                <input
                  className="quiet-input"
                  value={profile.name}
                  onChange={(e) =>
                    setProfile(prev => ({
                      ...prev,
                      name: e.target.value
                    }))
                  }
                />
              </div>

              <div>
                <p className="text-white/40 text-xs mb-3">
                  メールアドレス
                </p>

                <p className="text-white/70 text-sm">
                  {profile.email}
                </p>
              </div>

            </div>

          </div>

  

          <div className="glass-card p-6">

            <h2 className="text-white/75 text-sm tracking-widest mb-8">
              問いの届け方
            </h2>

            <div className="space-y-10">

              <div>

                <div className="flex items-center justify-between">

                  <div>
                    <p className="text-white/85 mb-1">
                      メール配信
                    </p>

                    <p className="text-white/35 text-xs">
                      毎週、問いをお届けします
                    </p>
                  </div>

                  <button
                    onClick={() =>
                      setPref(prev => ({
                        ...prev,
                        email_enabled: !prev.email_enabled
                      }))
                    }
                    className={`
                      w-14 h-8 rounded-full transition-all relative
                      ${pref.email_enabled
                        ? 'bg-white/80'
                        : 'bg-white/10'}
                    `}
                  >
                    <div
                      className={`
                        absolute top-1 w-6 h-6 rounded-full transition-all
                        ${pref.email_enabled
                          ? 'left-7 bg-slate-900'
                          : 'left-1 bg-white'}
                      `}
                    />
                  </button>

                </div>

              </div>

              <div>

                <p className="text-white/50 text-sm mb-4">
                  問いが届く曜日
                </p>

                <div className="flex flex-wrap gap-2">

                  {weekdays.map((day, index) => (
                    <button
                      key={day}
                      onClick={() =>
                        setPref(prev => ({
                          ...prev,
                          weekday: index
                        }))
                      }
                      className={`
                        w-12 h-12 rounded-full transition-all
                        ${pref.weekday === index
                          ? 'bg-white text-slate-900'
                          : 'btn-quiet text-white/70'}
                      `}
                    >
                      {day}
                    </button>
                  ))}

                </div>

              </div>

              <div>

                <p className="text-white/50 text-sm mb-4">
                  問いが届く時間
                </p>

                <select
                  className="quiet-select"
                  value={`${String(pref.hour).padStart(2, "0")}:00`}
                  onChange={(e) => {
                    const hour =
                      Number(e.target.value.split(":")[0]);

                    setPref(prev => ({
                      ...prev,
                      hour
                    }));
                  }}
                >
                  {timeOptions.map(t => (
                    <option key={t} value={t}>
                      {t}
                    </option>
                  ))}
                </select>

              </div>

              <div>

                <p className="text-white/50 text-sm mb-2">
                  配信方法
                </p>

                <p className="text-white/75">
                  メール
                </p>

              </div>

            </div>

          </div>

        </div>

        <div className="pt-10 pb-20">

          <button
            onClick={saveSettings}
            disabled={saving}
            className="btn-quiet bg-white/10 w-full py-5 rounded-full text-white"
          >
            {saving
              ? "保存しています..."
              : "保存する"}
          </button>

        </div>

      </div>

    </div>
  );
}

ReactDOM
  .createRoot(document.getElementById("root"))
  .render(<App />);

</script>
</body>
</html>
