<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Koe BOOK - Production v1</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Noto Serif JP', serif;
      margin: 0;
      background: #0f172a;
      color: white;
      overflow: hidden;
      position: fixed;
      inset: 0;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      height: 100%;
    }

    .fade-enter {
      animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .btn-quiet {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.85);
      transition: .3s;
      backdrop-filter: blur(10px);
    }

    .btn-quiet:active {
      transform: scale(.98);
    }

    .glass-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 16px;
    }

    .quiet-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,.2);
      color: white;
      width: 100%;
      padding: 8px 0;
      text-align: center;
      outline: none;
      font-size: 16px;
    }

    .text-narrative {
      line-height: 2.3;
      letter-spacing: .08em;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding:
        calc(env(safe-area-inset-top) + 2rem)
        24px
        calc(env(safe-area-inset-bottom) + 2rem);
      box-sizing: border-box;
    }

    audio {
      width: 100%;
      opacity: .8;
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect, useRef } = React;

const SUPABASE_URL = "https://wquxjeqkumossjxehdop.supabase.co";

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndxdXhqZXFrdW1vc3NqeGVoZG9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTEyMjksImV4cCI6MjA5MjU4NzIyOX0.wImRfRH2cr-w1uh2_c3vSS0_t4pHDeRWmWHZre1WbT4";

const GAS_AI_URL = "https://script.google.com/macros/s/AKfycbwz5wfVtHfGPmxpK6l3rKiqVn235sqwhmdIuPYvKSex02B_k6a5ULc-m7l_K3ig_AE/exec";

const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

async function askAI(transcriptRaw) {
  const res = await fetch(GAS_AI_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify({
      action: "processAudio",
      transcriptRaw
    })
  });

  const json = await res.json();

  if (!json.success) {
    throw new Error(json.error);
  }

  return json.data;
}

function App() {

  const [loading, setLoading] = useState(true);

  const [scene, setScene] = useState(-1);

  const [user, setUser] = useState(null);

  const [questionsDB, setQuestionsDB] = useState([]);

  const [progress, setProgress] = useState({
    currentIndex: 0,
    total: 0
  });

  const [voiceData, setVoiceData] = useState({
    transcript: "",
    duration: 0,
    audioBlob: null,
    audioUrl: null,
    editedText: "",
    aiMirror: "",
    extractedSnippet: "",
    answerId: null,
    storagePath: null
  });

  useEffect(() => {
    init();
  }, []);

  async function init() {

    try {

      const {
        data: { session }
      } = await supabaseClient.auth.getSession();

      if (!session) {
        setScene(-1);
        setLoading(false);
        return;
      }

      const userId = session.user.id;

      const {
        data: profile
      } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", userId)
        .maybeSingle();

      setUser({
        id: userId,
        ...profile
      });

      // ==========================================
      // user_questions を取得
      // ==========================================

      const {
        data: userQuestions,
        error: uqError
      } = await supabaseClient
        .from("user_questions")
        .select(`
          id,
          sequence_order,
          chapter,
          custom_question_text,
          question_id,
          questions (
            id,
            content,
            chapter
          )
        `)
        .eq("user_id", userId)
        .eq("is_active", true)
        .order("sequence_order", { ascending: true });

      if (uqError) {
        console.error(uqError);
        throw uqError;
      }

      const normalized = (userQuestions || []).map(q => ({
        user_question_id: q.id,
        question_id: q.question_id,
        sequence_order: q.sequence_order,
        chapter:
          q.chapter ||
          q.questions?.chapter ||
          "",
        content:
          q.custom_question_text ||
          q.questions?.content ||
          ""
      }));

      setQuestionsDB(normalized);

      setProgress({
        currentIndex: (profile?.current_sequence || 1) - 1,
        total: normalized.length
      });

      setScene(0);

    } catch (e) {
      console.error(e);
    } finally {
      setLoading(false);
    }
  }

  async function initializeUserQuestions(userId) {

    const {
      data: existing
    } = await supabaseClient
      .from("user_questions")
      .select("id")
      .eq("user_id", userId)
      .limit(1);

    if (existing && existing.length > 0) {
      return;
    }

    const {
      data: masterQuestions,
      error
    } = await supabaseClient
      .from("questions")
      .select("*")
      .eq("is_active", true)
      .order("sequence_order", { ascending: true });

    if (error) {
      console.error(error);
      return;
    }

    const inserts = masterQuestions.map((q, index) => ({
      user_id: userId,
      question_id: q.id,
      sequence_order: index + 1,
      chapter: q.chapter,
      is_active: true
    }));

    const { error: insertError } = await supabaseClient
      .from("user_questions")
      .insert(inserts);

    if (insertError) {
      console.error(insertError);
    }
  }

  async function handleLogin(userObj) {

    await initializeUserQuestions(userObj.id);

    setUser(userObj);

    await init();
  }

  async function handleSaveAnswer(tag) {

    try {

      setLoading(true);

      const currentSeq = progress.currentIndex + 1;

      const currentQ = questionsDB[progress.currentIndex];

      const answerId =
        voiceData.answerId ||
        crypto.randomUUID();

      const {
        error: answerError
      } = await supabaseClient
        .from("answers")
        .upsert({
          id: answerId,
          user_id: user.id,
          question_id: currentQ.question_id,
          sequence_order: currentSeq,
          transcript_raw: voiceData.transcript,
          transcript_edited: voiceData.editedText,
          ai_mirror: voiceData.aiMirror,
          snippet: voiceData.extractedSnippet,
          meta_json: {
            meaning_tag: tag,
            duration_seconds: voiceData.duration
          }
        }, {
          onConflict: "user_id,sequence_order"
        });

      if (answerError) {
        throw answerError;
      }

      // answered_at 更新

      await supabaseClient
        .from("user_questions")
        .update({
          answered_at: new Date().toISOString()
        })
        .eq("id", currentQ.user_question_id);

      await supabaseClient
        .from("profiles")
        .update({
          current_sequence: currentSeq + 1
        })
        .eq("id", user.id);

      setProgress(prev => ({
        ...prev,
        currentIndex: currentSeq
      }));

      setScene(6);

    } catch (e) {
      console.error(e);
      alert("保存に失敗しました");
    } finally {
      setLoading(false);
    }
  }

  if (loading) {
    return (
      <div className="h-screen flex items-center justify-center">
        <p className="text-white/30">
          物語を読み込んでいます...
        </p>
      </div>
    );
  }

  const currentQ =
    questionsDB[
      progress.currentIndex % (questionsDB.length || 1)
    ] || {
      chapter: "",
      content: "問いが見つかりません"
    };

  return (
    <div className="app-container">

      {scene === -1 && (
        <Scene_Login onLogin={handleLogin} />
      )}

      {scene === 0 && (
        <Scene0_Door
          onNext={() => setScene(1)}
        />
      )}

      {scene === 1 && (
        <Scene1_MyPage
          progress={progress}
          question={currentQ}
          userName={user?.name}
          onNext={() => setScene(2)}
        />
      )}

      {scene === 2 && (
        <Scene2_PreVoice
          onNext={() => setScene(3)}
        />
      )}

      {scene === 3 && (
        <Scene_Recording
          question={currentQ}
          onComplete={(text, duration, url, blob) => {
            setVoiceData(prev => ({
              ...prev,
              transcript: text,
              duration,
              audioUrl: url,
              audioBlob: blob
            }));

            setScene(4);
          }}
        />
      )}

      {scene === 4 && (
        <Scene4_AIMirror
          data={voiceData}
          onNext={() => setScene(5)}
        />
      )}

      {scene === 5 && (
        <Scene5_Meaning
          onNext={handleSaveAnswer}
        />
      )}

      {scene === 6 && (
        <Scene6_Completion
          onBookshelf={() => {
            location.href = "mypage.html";
          }}
        />
      )}

    </div>
  );
}

// ==========================================
// LOGIN
// ==========================================

function Scene_Login({ onLogin }) {

  const [email, setEmail] = useState("");
  const [name, setName] = useState("");
  const [step, setStep] = useState(1);
  const [pin, setPin] = useState("");

  async function sendPin() {

    const { error } =
      await supabaseClient.auth.signInWithOtp({
        email
      });

    if (error) {
      alert("送信に失敗しました");
      return;
    }

    setStep(2);
  }

  async function verifyPin() {

    const {
      data,
      error
    } = await supabaseClient.auth.verifyOtp({
      email,
      token: pin,
      type: "email"
    });

    if (error) {
      alert("コードが正しくありません");
      return;
    }

    const {
      data: profile
    } = await supabaseClient
      .from("profiles")
      .upsert({
        id: data.user.id,
        email,
        name
      })
      .select()
      .single();

    onLogin({
      id: data.user.id,
      ...profile
    });
  }

  return (
    <div className="h-full flex flex-col items-center justify-center text-center fade-enter">

      <p className="text-xl mb-12 leading-loose">
        この物語の持ち主を<br/>
        教えてください
      </p>

      {step === 1 ? (
        <div className="w-full max-w-[280px] space-y-8">

          <input
            className="quiet-input"
            placeholder="お名前"
            value={name}
            onChange={e => setName(e.target.value)}
          />

          <input
            className="quiet-input"
            placeholder="メールアドレス"
            value={email}
            onChange={e => setEmail(e.target.value)}
          />

          <button
            onClick={sendPin}
            className="btn-quiet w-full py-4 rounded-full"
          >
            認証コードを送る
          </button>

        </div>
      ) : (
        <div className="w-full max-w-[280px] space-y-8">

          <input
            className="quiet-input"
            placeholder="6桁コード"
            value={pin}
            onChange={e => setPin(e.target.value)}
          />

          <button
            onClick={verifyPin}
            className="btn-quiet w-full py-4 rounded-full"
          >
            物語をはじめる
          </button>

        </div>
      )}

    </div>
  );
}

function Scene0_Door({ onNext }) {
  return (
    <div className="h-full flex items-center justify-center text-center fade-enter">
      <div>
        <p className="text-xl leading-loose mb-16">
          この時間は、少し落ち着いて<br/>
          過ごせるときに開いてみてください
        </p>

        <button
          onClick={onNext}
          className="btn-quiet px-10 py-4 rounded-full"
        >
          この時間を始める
        </button>
      </div>
    </div>
  );
}

function Scene1_MyPage({ progress, question, userName, onNext }) {

  return (
    <div className="h-full flex flex-col fade-enter">

      <header className="mb-8">

        <p className="text-white/50 text-sm mb-4">
          {userName}さんの物語
        </p>

        <div className="w-full h-[2px] bg-white/10 rounded-full">
          <div
            className="h-full bg-white/40"
            style={{
              width: `${(progress.currentIndex / progress.total) * 100}%`
            }}
          />
        </div>

        <p className="text-white/60 text-sm mt-3">
          {progress.currentIndex + 1} / {progress.total} ページ
        </p>

      </header>

      <div className="flex-1 flex items-center">

        <div className="glass-card p-8 w-full text-center">

          <p className="text-white/40 text-xs tracking-widest mb-6">
            今日の問い
          </p>

          <p className="text-xl text-narrative whitespace-pre-wrap">
            {question.content}
          </p>

        </div>

      </div>

      <div className="pb-8 pt-8">

        <button
          onClick={onNext}
          className="btn-quiet w-full py-4 rounded-full"
        >
          今回の問いに答える
        </button>

      </div>

    </div>
  );
}

function Scene2_PreVoice({ onNext }) {

  useEffect(() => {
    const t = setTimeout(onNext, 3000);
    return () => clearTimeout(t);
  }, []);

  return (
    <div className="h-full flex items-center justify-center text-center fade-enter">
      <p className="text-white/70 text-xl text-narrative">
        すぐに答えなくても大丈夫です
      </p>
    </div>
  );
}

function Scene_Recording({ question, onComplete }) {

  const [recording, setRecording] = useState(false);
  const [time, setTime] = useState(0);

  const mediaRef = useRef(null);
  const chunksRef = useRef([]);

  useEffect(() => {

    let timer;

    if (recording) {
      timer = setInterval(() => {
        setTime(t => t + 1);
      }, 1000);
    }

    return () => clearInterval(timer);

  }, [recording]);

  async function start() {

    const stream = await navigator.mediaDevices.getUserMedia({
      audio: true
    });

    const mediaRecorder = new MediaRecorder(stream);

    mediaRef.current = mediaRecorder;

    chunksRef.current = [];

    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) {
        chunksRef.current.push(e.data);
      }
    };

    mediaRecorder.onstop = () => {

      const blob = new Blob(chunksRef.current, {
        type: mediaRecorder.mimeType
      });

      const url = URL.createObjectURL(blob);

      onComplete(
        "",
        time,
        url,
        blob
      );
    };

    mediaRecorder.start();

    setRecording(true);
  }

  function stop() {

    mediaRef.current.stop();

    setRecording(false);
  }

  return (
    <div className="h-full flex flex-col text-center fade-enter">

      <div className="flex-1 flex items-center justify-center">
        <p className="text-xl text-narrative whitespace-pre-wrap">
          {question.content}
        </p>
      </div>

      <div className="pb-20">

        {!recording ? (
          <button
            onClick={start}
            className="w-20 h-20 rounded-full bg-white/10 border border-white/30"
          >
            開始
          </button>
        ) : (
          <div>

            <p className="mb-8 text-3xl">
              {time}
            </p>

            <button
              onClick={stop}
              className="w-16 h-16 rounded-full bg-white text-slate-900"
            >
              完了
            </button>

          </div>
        )}

      </div>

    </div>
  );
}

function Scene4_AIMirror({ data, onNext }) {

  return (
    <div className="h-full flex flex-col fade-enter">

      <div className="flex-1 overflow-y-auto">

        <div className="glass-card p-5 mb-8">
          <p className="text-amber-100">
            {data.aiMirror || "ひとつの時間が形になっています"}
          </p>
        </div>

        <p className="text-narrative whitespace-pre-wrap">
          {data.editedText || data.transcript}
        </p>

      </div>

      <div className="pt-8">
        <button
          onClick={onNext}
          className="btn-quiet w-full py-4 rounded-full"
        >
          次へ進む
        </button>
      </div>

    </div>
  );
}

function Scene5_Meaning({ onNext }) {

  const tags = [
    "少し懐かしい時間",
    "誰かを思い出す時間",
    "自分を振り返る時間",
    "言葉にできなかった時間"
  ];

  return (
    <div className="h-full flex flex-col justify-center fade-enter">

      <p className="text-center text-xl text-narrative mb-10">
        この語りは、あなたにとって<br/>
        どんな時間でしたか？
      </p>

      <div className="space-y-4">

        {tags.map(tag => (
          <button
            key={tag}
            onClick={() => onNext(tag)}
            className="btn-quiet w-full py-4 rounded-xl"
          >
            {tag}
          </button>
        ))}

      </div>

    </div>
  );
}

function Scene6_Completion({ onBookshelf }) {

  return (
    <div className="h-full flex flex-col items-center justify-center text-center fade-enter">

      <p className="text-xl leading-loose mb-14">
        あなたの物語に、<br/>
        ひとつのページが加わりました
      </p>

      <button
        onClick={onBookshelf}
        className="btn-quiet px-10 py-4 rounded-full"
      >
        本棚に戻る
      </button>

    </div>
  );
}

ReactDOM.createRoot(
  document.getElementById("root")
).render(<App />);

</script>
</body>
</html>
