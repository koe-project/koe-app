<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Koe BOOK - Production v1</title>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { 
      font-family: 'Noto Serif JP', serif; margin: 0; padding: 0; background-color: #0f172a; color: #f8fafc; 
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      overscroll-behavior: none; -webkit-font-smoothing: antialiased; transition: background-color 2s ease; 
    }
    body.is-recording { background-color: #15203b; }
    #root { height: 100%; width: 100%; overflow: hidden; }
    .app-container { 
      display: flex; flex-direction: column; height: 100%; max-width: 600px; margin: 0 auto; position: relative; 
      box-sizing: border-box; padding-top: calc(env(safe-area-inset-top) + 2rem);
      padding-bottom: calc(env(safe-area-inset-bottom) + 2rem); padding-left: 24px; padding-right: 24px;
    }
    .fade-enter { animation: fadeIn 1.2s ease-out forwards; }
    .fade-enter-fast { animation: fadeIn 0.6s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .btn-quiet { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.8); transition: all 0.4s ease; backdrop-filter: blur(10px); }
    .btn-quiet:active { transform: scale(0.98); background: rgba(255, 255, 255, 0.1); }
    .btn-quiet:disabled { opacity: 0.5; pointer-events: none; }
    .text-narrative { line-height: 2.4; letter-spacing: 0.08em; }
    .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; }
    input.quiet-input { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); color: white; width: 100%; padding: 8px 0; outline: none; text-align: center; border-radius: 0; transition: border-color 0.3s; }
    input.quiet-input:focus { border-bottom-color: rgba(255,255,255,0.6); }
    audio { width: 100%; height: 36px; border-radius: 20px; opacity: 0.7; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // ⚙️ 環境設定
    // ==========================================
    const SUPABASE_URL = "https://wquxjeqkumossjxehdop.supabase.co"; // ★書き換え
    const SUPABASE_ANON_KEY = "sb_publishable_0YuJ5GMOaVa4oMWHjmCGlQ_ZvuHJPvz"; // ★書き換え
    const GAS_AI_URL = "https://script.google.com/macros/s/AKfycbwz5wfVtHfGPmxpK6l3rKiqVn235sqwhmdIuPYvKSex02B_k6a5ULc-m7l_K3ig_AE/exec"; // ★書き換え

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const askAI = async (transcriptRaw) => {
      const res = await fetch(GAS_AI_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'processAudio', transcriptRaw }) });
      const json = await res.json();
      if (!json.success) throw new Error(json.error);
      return json.data;
    };

    // ==========================================
    // 🎬 メインアプリ
    // ==========================================
    function App() {
      const [isInitializing, setIsInitializing] = useState(true);
      const [scene, setScene] = useState(-1); 
      const [user, setUser] = useState(null);
      const [questionsDB, setQuestionsDB] = useState([]);
      const [progress, setProgress] = useState({ currentIndex: 0, total: 30 });
      const [voiceData, setVoiceData] = useState({ 
        duration: 0, transcript: "", audioUrl: null, hasAudio: false, audioBlob: null, 
        editedText: "", aiMirror: "", extractedSnippet: "", 
        answerId: null, storagePath: null 
      });

      useEffect(() => {
        const initApp = async () => {
          try {
            const { data: qList } = await supabaseClient.from('questions').select('*').order('sequence_order', { ascending: true });
            if (qList && qList.length > 0) {
              setQuestionsDB(qList);
              setProgress(p => ({ ...p, total: qList.length }));
            }
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
              const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
              setUser({ id: session.user.id, ...profile });
              setProgress(p => ({ ...p, currentIndex: (profile?.current_sequence || 1) - 1 }));
              setScene(0); 
            } else {
              setScene(-1); 
            }
          } catch (e) { console.error(e); } finally { setIsInitializing(false); }
        };
        initApp();
      }, []);

      const handleRecordComplete = (txt, dur, url, blob) => {
        setVoiceData(prev => ({...prev, transcript: txt, duration: dur, audioUrl: url, audioBlob: blob, hasAudio: !!(blob && blob.size > 0)}));
      };

      const handleVoiceProceed = async () => {
        setScene("processing"); 
        try {
          const currentSeq = progress.currentIndex + 1;
          let targetAnswerId = crypto.randomUUID();

          const { data: existingAnswer } = await supabaseClient
            .from('answers')
            .select('id')
            .match({ user_id: user.id, sequence_order: currentSeq })
            .maybeSingle();
          if (existingAnswer) targetAnswerId = existingAnswer.id;

          let path = null;
          if (voiceData.hasAudio && voiceData.audioBlob) {
            path = `${user.id}/${targetAnswerId}.webm`;
            const { error: uploadError } = await supabaseClient.storage
              .from('audio')
              .upload(path, voiceData.audioBlob, { contentType: 'audio/webm', upsert: true });
            if (uploadError) throw new Error("音声の退避に失敗しました");
          }

          setVoiceData(prev => ({ ...prev, answerId: targetAnswerId, storagePath: path }));

          const res = await askAI(voiceData.transcript);
          setVoiceData(prev => ({...prev, editedText: res.transcript_edited, aiMirror: res.ai_mirror_text, extractedSnippet: res.extracted_snippet}));
          
          setScene(4); 
        } catch (error) {
          console.error(error);
          alert("通信エラーが発生しました。");
          setScene(3.5); 
        }
      };

      const handleSaveAnswer = async (tag) => {
        setIsInitializing(true);
        try {
          const currentSeq = progress.currentIndex + 1;
          const currentQ = questionsDB[progress.currentIndex];
          const ansId = voiceData.answerId;
          
          const { error: dbError } = await supabaseClient.from('answers').upsert({
            id: ansId,
            user_id: user.id,
            question_id: currentQ?.id,
            sequence_order: currentSeq,
            transcript_raw: voiceData.transcript,
            transcript_edited: voiceData.editedText,
            ai_mirror: voiceData.aiMirror,
            snippet: voiceData.extractedSnippet,
            meta_json: { meaning_tag: tag, duration_seconds: voiceData.duration }
          }, { onConflict: 'id' });
          if (dbError) throw new Error("回答の記録に失敗しました");

          if (voiceData.storagePath) {
            await supabaseClient.from('media_assets').upsert({
              answer_id: ansId,
              user_id: user.id,
              asset_type: 'audio',
              storage_path: voiceData.storagePath
            }, { onConflict: 'answer_id, asset_type, storage_path' });
          }

          await supabaseClient.from('profiles').update({ current_sequence: currentSeq + 1 }).eq('id', user.id);

          setProgress(p => ({ ...p, currentIndex: currentSeq }));
          localStorage.setItem('koe_last_visit', Date.now().toString());
          setScene(6); 
        } catch (error) {
          console.error(error);
          alert("保存に失敗しました。");
          setScene(5);
        } finally { setIsInitializing(false); }
      };

      if (isInitializing) return <div className="bg-[#0f172a] h-screen w-screen flex items-center justify-center"><p className="text-white/30 tracking-widest text-sm animate-pulse">物語を読み込んでいます...</p></div>;

      const currentQ = questionsDB[progress.currentIndex % (questionsDB.length || 1)] || { chapter: "...", content: "問いを取得できませんでした" };

      return (
        <div className="app-container">
          {scene === -1 && <Scene_Login onLogin={(u) => { setUser(u); setScene(0); }} />}
          {scene === 0 && <Scene0_Door onNext={() => setScene(1)} />}
          {scene === 1 && <Scene1_MyPage progress={progress} question={currentQ} userName={user?.name} onNext={() => setScene(2)} />}
          {scene === 2 && <Scene2_PreVoice onNext={() => setScene(3)} duration={3000} />}
          {scene === 3 && <Scene_Recording question={currentQ} onComplete={(t,d,u,b) => { handleRecordComplete(t,d,u,b); setScene(3.5); }} />}
          {scene === 3.5 && <Scene3_5_VoiceCheck data={voiceData} onRetry={() => setScene(3)} onProceed={handleVoiceProceed} />}
          {scene === "processing" && <Scene_Processing />}
          {scene === 4 && <Scene4_AIMirror data={voiceData} onNext={() => setScene(5)} />}
          {scene === 5 && <Scene5_Meaning onNext={handleSaveAnswer} />}
          {scene === 6 && <Scene6_Completion progress={progress} onTalkMore={() => setScene(2)} onBackToBookshelf={() => window.location.href = 'mypage.html'} />}
        </div>
      );
    }

    // ==========================================
    // 🔐 シーン：ログイン
    // ==========================================
    function Scene_Login({ onLogin }) {
      const [email, setEmail] = useState(""); const [name, setName] = useState(""); const [step, setStep] = useState(1); const [pin, setPin] = useState(""); const [loading, setLoading] = useState(false);
      
      const handleSendPin = async () => {
        setLoading(true);
        const { error } = await supabaseClient.auth.signInWithOtp({ email });
        setLoading(false);
        if (error) alert("エラーが発生しました。"); else setStep(2);
      };
      
      const handleVerifyPin = async () => {
        setLoading(true);
        const { data, error } = await supabaseClient.auth.verifyOtp({ email, token: pin, type: 'email' });
        if (error) { setLoading(false); alert("コードが正しくありません。"); return; }
        const { data: profile } = await supabaseClient.from('profiles').upsert({ id: data.user.id, email: email, name: name }).select().single();
        setLoading(false); onLogin({ id: data.user.id, ...profile });
      };
      
      return (
        <div className="h-full flex flex-col items-center justify-center fade-enter px-4 text-center">
          <p className="text-[1.1rem] text-white/90 text-narrative mb-12">この物語の持ち主を<br/>教えてください。</p>
          {step === 1 ? (
            <div className="w-full max-w-[280px] space-y-8 mb-12">
              <div><p className="text-white/40 text-xs mb-2">お名前</p><input type="text" className="quiet-input" value={name} onChange={e => setName(e.target.value)} /></div>
              <div><p className="text-white/40 text-xs mb-2">メールアドレス</p><input type="email" className="quiet-input" value={email} onChange={e => setEmail(e.target.value)} /></div>
              <button onClick={handleSendPin} disabled={!email || !name || loading} className="btn-quiet w-full py-4 rounded-full text-sm">{loading ? "送信中..." : "認証コードを送る"}</button>
            </div>
          ) : (
            <div className="w-full max-w-[280px] space-y-8 mb-12 fade-enter">
              <p className="text-white/60 text-xs">メールに届いた6桁のコードを入力してください</p>
              <input type="text" className="quiet-input tracking-widest text-xl" value={pin} onChange={e => setPin(e.target.value)} placeholder="000000" maxLength="6" />
              <button onClick={handleVerifyPin} disabled={pin.length !== 6 || loading} className="btn-quiet w-full py-4 rounded-full text-sm">物語をはじめる</button>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 🌿 各種UI
    // ==========================================
    function Scene0_Door({ onNext }) {
      return (<div className="h-full flex flex-col items-center justify-center text-center fade-enter px-4"><div className="space-y-6 mb-16 text-narrative"><p className="text-[1.1rem] text-white/90">この時間は、少し落ち着いて<br/>過ごせるときに開いてみてください</p></div><button onClick={onNext} className="btn-quiet w-full max-w-[280px] py-4 rounded-full text-sm">この時間を始める</button></div>);
    }

    function Scene1_MyPage({ progress, question, userName, onNext }) {
      return (
        <div className="h-full flex flex-col fade-enter">
          <header className="mb-8 pt-2">
            <h1 className="text-white/70 text-sm tracking-widest mb-6">{userName}さんの物語</h1>
            <div className="space-y-2">
              <p className="text-white/60 text-xs tracking-widest">{question.chapter}</p>
              <div className="w-full h-[2px] bg-white/10 rounded-full">
                <div className="h-full bg-white/40" style={{ width: `${(progress.currentIndex / progress.total) * 100}%` }}></div>
              </div>
              <div className="flex justify-between items-end mt-2">
                <p className="text-white/80 text-sm tracking-widest">{progress.currentIndex + 1} / {progress.total} ページ</p>
              </div>
            </div>
          </header>
          <div className="flex-1 flex flex-col justify-center">
            <div className="glass-card p-6 text-center space-y-6">
              <p className="text-white/50 text-xs tracking-widest">今日の問い</p>
              <p className="text-[1.1rem] text-narrative text-white/90 whitespace-pre-wrap">{question.content}</p>
            </div>
          </div>
          <div className="flex flex-col gap-4 mt-8 pb-8">
            <button onClick={onNext} className="btn-quiet bg-white/10 w-full py-4 rounded-full tracking-widest text-white">今回の問いに答える</button>
          </div>
        </div>
      );
    }

    function Scene2_PreVoice({ onNext, duration }) {
      useEffect(() => { const t = setTimeout(onNext, duration); return () => clearTimeout(t); }, []);
      return (<div className="h-full flex items-center justify-center text-center fade-enter"><p className="text-[1.1rem] text-white/70 text-narrative tracking-[0.15em] animate-pulse">すぐに答えなくても大丈夫です</p></div>);
    }

    function Scene_Recording({ question, onComplete }) {
      const [step, setStep] = useState(0); const [time, setTime] = useState(0); const [text, setText] = useState("");
      const mediaRef = useRef(null); const chunksRef = useRef([]); const speechRef = useRef(null);
      useEffect(() => { let timer; if (step === 1) timer = setInterval(() => setTime(t => t + 1), 1000); return () => clearInterval(timer); }, [step]);

      const start = async () => {
        setStep(1);
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRef.current = new MediaRecorder(stream);
          mediaRef.current.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
          mediaRef.current.start();
          const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
          if (SpeechRec) {
            speechRef.current = new SpeechRec(); speechRef.current.lang = 'ja-JP'; speechRef.current.continuous = true; speechRef.current.interimResults = true;
            speechRef.current.onresult = e => { let f = ""; for(let i=0; i<e.results.length; i++) { if(e.results[i].isFinal) f+=e.results[i][0].transcript; } if(f) setText(prev => prev + f); };
            speechRef.current.start();
          }
        } catch (e) { alert("マイクが使えません"); setStep(0); }
      };

      const stop = () => {
        setStep(2);
        if (speechRef.current) speechRef.current.stop();
        if (mediaRef.current) {
          mediaRef.current.onstop = () => {
            const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
            onComplete(text, time, URL.createObjectURL(blob), blob);
            mediaRef.current.stream.getTracks().forEach(t => t.stop());
          };
          mediaRef.current.stop();
        }
      };

      return (
        <div className="h-full flex flex-col fade-enter text-center pt-12">
          <p className="text-white/60 text-[1.05rem] text-narrative flex-1">{question.content}</p>
          <div className="pb-20">
            {step === 0 && <button onClick={start} className="w-20 h-20 rounded-full bg-white/10 border border-white/30 text-white/70 mx-auto block">開始</button>}
            {step === 1 && <div className="space-y-8"><p className="font-mono text-3xl text-white/80 animate-pulse">{Math.floor(time/60).toString().padStart(2,'0')}:{(time%60).toString().padStart(2,'0')}</p><button onClick={stop} className="w-16 h-16 rounded-full bg-white text-slate-900 mx-auto block font-bold text-xs">完了</button></div>}
            {step === 2 && <p className="text-white/50 text-sm animate-pulse">音声を預かっています...</p>}
          </div>
        </div>
      );
    }

    function Scene3_5_VoiceCheck({ data, onRetry, onProceed }) {
      return (
        <div className="h-full flex flex-col items-center justify-center fade-enter px-6 text-center">
          <div className="glass-card p-8 w-full max-w-[320px] mb-12"><p className="text-white/40 text-xs mb-4">RECORDED AUDIO</p><audio controls src={data.audioUrl} /></div>
          <div className="flex flex-col gap-4 w-full max-w-[280px]"><button onClick={onProceed} className="btn-quiet bg-white/10 w-full py-4 rounded-full text-white">この内容で進む</button><button onClick={onRetry} className="w-full py-3 text-white/40 text-sm underline underline-offset-4">もう一度話す</button></div>
        </div>
      );
    }

    function Scene_Processing() {
      return (<div className="h-full flex flex-col items-center justify-center fade-enter text-center"><div className="w-4 h-4 rounded-full border-2 border-white/20 border-t-white/80 animate-spin mb-6"></div><p className="text-white/50 tracking-widest text-sm text-narrative">声を預かり、<br/>言葉を編んでいます...</p></div>);
    }

    function Scene4_AIMirror({ data, onNext }) {
      return (
        <div className="h-full flex flex-col fade-enter">
          <div className="flex-1 overflow-y-auto pb-10"><div className="mb-8 p-4 bg-white/5 border-l-2 border-amber-600/50 rounded-r-lg"><p className="text-amber-50/90 text-[0.95rem] tracking-widest">{data.aiMirror}</p></div><div className="text-white/80 text-[1.05rem] text-narrative whitespace-pre-wrap">{data.editedText}</div></div>
          <div className="pt-6 border-t border-white/10"><button onClick={onNext} className="btn-quiet bg-white/10 w-full py-4 rounded-full text-white">次へ進む</button></div>
        </div>
      );
    }

    function Scene5_Meaning({ onNext }) {
      return (
        <div className="h-full flex flex-col fade-enter"><div className="flex-1 flex flex-col justify-center text-center"><p className="text-white/80 text-[1.1rem] text-narrative mb-10">この語りは、あなたにとって<br />どんな時間でしたか？</p><div className="flex flex-col gap-4 px-4">{["少し懐かしい時間", "誰かを思い出す時間", "自分を振り返る時間", "言葉にできなかった時間"].map(t => (<button key={t} onClick={() => onNext(t)} className="btn-quiet py-4 rounded-xl">{t}</button>))}</div></div><button onClick={() => onNext("スキップ")} className="mb-6 text-white/30 text-sm underline underline-offset-4">スキップして保存</button></div>
      );
    }

    function Scene6_Completion({ progress, onTalkMore, onBackToBookshelf }) {
      return (
        <div className="h-full flex flex-col items-center justify-center fade-enter text-center">
          <p className="text-white/90 text-[1.05rem] mb-12">あなたの物語に、<br/>ひとつのページが加わりました</p>
          <div className="flex flex-col gap-4 w-full max-w-[280px]"><button onClick={onTalkMore} className="btn-quiet bg-white/10 w-full py-4 rounded-full text-white">もう1ページ進める</button><button onClick={onBackToBookshelf} className="w-full py-3 text-white/40 text-sm underline underline-offset-4">本棚に戻る</button></div>
        </div>
      );
    }

    const startApp = () => { const container = document.getElementById('root'); if (container) { const root = ReactDOM.createRoot(container); root.render(<App />); } };
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', startApp); else startApp();
  </script>
</body>
</html>
