<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koe Bookshelf (PC版 Myページ)</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Noto Serif JP', serif; background-color: #0f172a; color: #f8fafc; margin: 0; height: 100vh; overflow: hidden; }
    .fade-enter { animation: fadeIn 0.8s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .btn-quiet { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.8); transition: all 0.3s ease; }
    .btn-quiet:hover:not(:disabled) { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2); }
    .btn-quiet:disabled { opacity: 0.3; cursor: not-allowed; }
    .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.4s ease; }
    .quiet-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; padding: 12px; outline: none; width: 100%; }
    .quiet-input:focus { border-color: rgba(255,255,255,0.3); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const UX_CONFIG = { GAS_API_URL: "https://script.google.com/macros/s/AKfycbxiRNo8BeX4U5yip8DjhyJToHGPAGdtNpEUa2QFhAtpj4R_BgDu_0R1kkGCGEGRpR1N/exec" };
    
    const apiFetch = async (action, data = {}) => {
      const res = await fetch(UX_CONFIG.GAS_API_URL, {
        method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action, ...data })
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.error);
      return json.data;
    };

    function KoeBookshelf() {
      const [isLoading, setIsLoading] = useState(true);
      const [accessError, setAccessError] = useState("");
      const [mode, setMode] = useState("grid"); // grid / page / finalize / meta / order_complete
      const [activeChapter, setActiveChapter] = useState("すべて");
      
      const [bookData, setBookData] = useState({
        user: { name: "あなた" },
        progress: { currentIndex: 0, total: 30 },
        pages: []
      });
      const [selectedPageId, setSelectedPageId] = useState(null);

      const loadData = async () => {
        const storedUserId = localStorage.getItem('koe_user_id');
        if (!storedUserId) {
          setAccessError("まだ物語が始まっていません。先に「語るアプリ」を開始してください。");
          setIsLoading(false); return;
        }
        try {
          const data = await apiFetch('getBookshelfData', { user_id: storedUserId });
          setBookData(data);
        } catch (e) { setAccessError("読み込みに失敗しました。"); }
        finally { setIsLoading(false); }
      };

      useEffect(() => { loadData(); }, []);

      const selectedPage = bookData.pages.find(p => p.answer_id === selectedPageId);

      if (isLoading) return <div className="h-screen w-screen bg-[#0f172a] flex items-center justify-center text-white/30 tracking-widest text-sm">書架を開いています...</div>;
      if (accessError) return <div className="h-screen w-screen bg-[#0f172a] flex items-center justify-center px-6 text-center"><p className="text-white/40">{accessError}</p></div>;

      return (
        <div className="h-full flex flex-col bg-[#0f172a] text-white overflow-hidden fade-enter">
          <BookshelfHeader progress={bookData.progress} userName={bookData.user.name} onOpenMeta={() => setMode("meta")} />
          <div className="flex flex-1 overflow-hidden">
            <ChapterSidebar 
              activeChapter={activeChapter} 
              onChange={(chapter) => { setActiveChapter(chapter); setMode("grid"); }} 
              onFinalize={() => setMode("finalize")}
              progress={bookData.progress}
            />
            <div className="flex-1 overflow-y-auto relative">
              <MainPanel 
                mode={mode} setMode={setMode} 
                pages={bookData.pages} activeChapter={activeChapter}
                selectedPage={selectedPage} onOpenPage={(id) => { setSelectedPageId(id); setMode("page"); }}
                progress={bookData.progress} onRefresh={loadData}
              />
            </div>
          </div>
        </div>
      );
    }

    function BookshelfHeader({ progress, userName, onOpenMeta }) {
      return (
        <div className="flex justify-between items-center px-10 py-5 border-b border-white/5 bg-white/[0.01]">
          <div>
            <p className="text-white/50 text-xs tracking-widest mb-2">{userName}さんの物語</p>
            <div className="flex items-end gap-4">
              <p className="text-white/90 text-[1.05rem] tracking-wider font-serif">{progress.currentIndex} / {progress.total} ページ</p>
            </div>
          </div>
          <div className="flex gap-8">
            <button onClick={onOpenMeta} className="text-white/40 hover:text-white/80 transition-colors text-[0.8rem] tracking-widest">本を整える</button>
            <button className="text-white/40 hover:text-white/80 transition-colors text-[0.8rem] tracking-widest">家族とつなぐ</button>
          </div>
        </div>
      );
    }

    function ChapterSidebar({ activeChapter, onChange, onFinalize, progress }) {
      const chapters = ["すべて", "思い出す", "積み重ねる", "関係性", "手渡す"];
      const isReady = progress.currentIndex >= 20;
      return (
        <div className="w-64 border-r border-white/5 p-8 flex flex-col bg-white/[0.005]">
          <div className="flex-1 space-y-1">
            {chapters.map(c => (
              <button key={c} onClick={() => onChange(c)} className={`block w-full text-left py-2.5 px-4 rounded-md text-[0.85rem] transition-all ${activeChapter === c ? "bg-white/[0.06] text-white/80" : "text-white/40 hover:text-white/70"}`}>{c}</button>
            ))}
          </div>
          <div className="pt-8 border-t border-white/5 mt-auto">
            <button onClick={onFinalize} className={`w-full text-left py-4 px-4 rounded-lg text-sm tracking-widest flex justify-between items-center ${isReady ? "text-amber-400" : "text-white/30"}`}>
              <span>{isReady ? "本を仕上げる" : "まだ語りの途中です"}</span> <span>→</span>
            </button>
          </div>
        </div>
      );
    }

    function MainPanel({ mode, setMode, pages, activeChapter, selectedPage, onOpenPage, progress, onRefresh }) {
      const filtered = useMemo(() => activeChapter === "すべて" ? pages : pages.filter(p => p.chapter === activeChapter), [pages, activeChapter]);
      if (mode === "grid") return <GridView pages={filtered} onOpen={onOpenPage} activeChapter={activeChapter} />;
      if (mode === "page") return <PageDetailView page={selectedPage} onBack={() => setMode("grid")} onRefresh={onRefresh} />;
      if (mode === "finalize") return <FinalizeView progress={progress} onBack={() => setMode("grid")} onProceed={() => setMode("meta")} />;
      if (mode === "meta") return <BookMetaView onBack={() => setMode("grid")} onOrder={() => setMode("order_complete")} />;
      if (mode === "order_complete") return <OrderCompleteView onBack={() => setMode("grid")} />;
    }

    function GridView({ pages, onOpen, activeChapter }) {
      return (
        <div className="max-w-5xl mx-auto p-10">
          <h2 className="text-2xl text-white/90 tracking-widest font-serif mb-10">{activeChapter}</h2>
          <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            {pages.map(p => (
              <div key={p.sequence_order} onClick={() => p.is_answered && onOpen(p.answer_id)} className={`glass-card p-6 rounded-xl flex flex-col h-52 relative overflow-hidden transition-all ${p.is_answered ? 'cursor-pointer group' : 'opacity-40'}`}>
                <div className="flex justify-between items-start mb-4">
                  <p className="text-[0.65rem] text-white/40">PAGE {p.sequence_order}</p>
                  <div className={`w-2 h-2 rounded-full ${p.has_photo ? "bg-amber-500 shadow-[0_0_8px_rgba(245,158,11,0.5)]" : p.is_answered ? "bg-white/40" : "border border-white/20"}`}></div>
                </div>
                <p className="text-[0.95rem] leading-[1.65] text-white/60 line-clamp-3 flex-1">{p.is_answered ? p.extracted_snippet : "まだ、このページは静かなままです"}</p>
                <p className="text-[0.75rem] text-white/40 truncate mt-4">{p.question_text}</p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function PageDetailView({ page, onBack, onRefresh }) {
      const [isUploading, setIsUploading] = useState(false);
      const fileInputRef = useRef(null);
      const handleFile = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        setIsUploading(true);
        const reader = new FileReader();
        reader.onload = async (event) => {
          try {
            await apiFetch('uploadImage', { user_id: localStorage.getItem('koe_user_id'), answer_id: page.answer_id, base64Data: event.target.result, fileName: file.name });
            await onRefresh();
          } catch (e) { alert("アップロードに失敗しました。"); }
          finally { setIsUploading(false); }
        };
        reader.readAsDataURL(file);
      };

      return (
        <div className="max-w-3xl mx-auto p-10">
          <button onClick={onBack} className="mb-6 text-white/30 hover:text-white/70 text-sm tracking-widest">← 書架に戻る</button>
          <h1 className="text-xl text-white/70 text-center mb-10 font-serif">{page.question_text}</h1>
          <div className="mb-8 p-5 bg-white/[0.02] border-l-2 border-amber-600/50 rounded-r-lg"><p className="text-amber-100/70 text-[0.95rem] italic">{page.ai_mirror_text}</p></div>
          <p className="text-white/90 text-[1.05rem] leading-[2.4] font-serif whitespace-pre-wrap mb-12">{page.transcript_edited}</p>
          <div className="border-t border-white/10 pt-10 flex flex-col items-center">
            <p className="text-white/40 text-[0.8rem] mb-6">この記憶にまつわる、アルバムの中の一枚を加えられます</p>
            {isUploading ? <p className="animate-pulse text-white/40">保存しています...</p> : (
              <button onClick={() => fileInputRef.current.click()} className="btn-quiet px-8 py-4 rounded-full text-sm">
                {page.has_photo ? "写真を変更する" : "+ このページに、風景を添える"}
              </button>
            )}
            <input type="file" accept="image/*" className="hidden" ref={fileInputRef} onChange={handleFile} />
          </div>
        </div>
      );
    }

    function BookMetaView({ onBack, onOrder }) {
      const [meta, setMeta] = useState({ title: "", author: "", spec: "hardcover", quantity: 1 });
      const [isSaving, setIsSaving] = useState(false);
      const handleSave = async () => {
        setIsSaving(true);
        try { await apiFetch('saveBookMeta', { user_id: localStorage.getItem('koe_user_id'), bookMeta: meta }); onOrder(); }
        catch (e) { alert("保存に失敗しました。"); } finally { setIsSaving(false); }
      };

      return (
        <div className="max-w-xl mx-auto p-10">
          <h2 className="text-xl mb-10 tracking-widest font-serif text-center">本のかたちを決める</h2>
          <div className="space-y-8">
            <div><p className="text-xs text-white/40 mb-2">本のタイトル</p><input className="quiet-input" value={meta.title} onChange={e => setMeta({...meta, title: e.target.value})} placeholder="例：私の歩んできた道" /></div>
            <div><p className="text-xs text-white/40 mb-2">著者名</p><input className="quiet-input" value={meta.author} onChange={e => setMeta({...meta, author: e.target.value})} placeholder="例：山田 太郎" /></div>
            <div className="flex gap-4">
              <div className="flex-1"><p className="text-xs text-white/40 mb-2">冊子の仕様</p><select className="quiet-input" value={meta.spec} onChange={e => setMeta({...meta, spec: e.target.value})}><option value="hardcover">ハードカバー（上製本）</option><option value="softcover">ソフトカバー（並製本）</option></select></div>
              <div className="w-24"><p className="text-xs text-white/40 mb-2">冊数</p><input type="number" className="quiet-input" value={meta.quantity} onChange={e => setMeta({...meta, quantity: e.target.value})} min="1" /></div>
            </div>
            <button onClick={handleSave} disabled={isSaving || !meta.title} className="btn-quiet w-full py-5 rounded-xl text-white mt-10 shadow-lg">{isSaving ? "保存中..." : "この内容で注文を確定する"}</button>
            <button onClick={onBack} className="w-full text-white/30 text-sm underline mt-4">まだ注文せずに戻る</button>
          </div>
        </div>
      );
    }

    function FinalizeView({ progress, onBack, onProceed }) {
      return (
        <div className="max-w-2xl mx-auto p-10 text-center">
          <h2 className="text-2xl mb-4 font-serif">現在、{progress.currentIndex}ページが編まれています</h2>
          <p className="text-white/40 text-sm mb-12">語られた言葉が、一冊の本になるだけの量まで積み重なっています。</p>
          <button onClick={onProceed} className="btn-quiet w-full py-6 rounded-xl text-white text-lg shadow-xl">本の仕上げに進む</button>
          <button onClick={onBack} className="mt-8 text-white/30 block mx-auto underline text-sm">書架に戻り、もう少し語る</button>
        </div>
      );
    }

    function OrderCompleteView({ onBack }) {
      return (
        <div className="max-w-xl mx-auto p-10 text-center">
          <div className="mb-10 text-4xl">📚</div>
          <h2 className="text-xl mb-4 font-serif">ご注文を承りました</h2>
          <p className="text-white/40 text-sm leading-relaxed mb-12">ここから一冊の本として丁寧に仕上げてお届けします。<br/>完成まで、楽しみにお待ちください。</p>
          <button onClick={onBack} className="btn-quiet px-10 py-4 rounded-full text-sm">書架に戻る</button>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<KoeBookshelf />);
  </script>
</body>
</html>
