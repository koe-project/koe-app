<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koe Bookshelf</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Serif JP', serif; background-color: #0f172a; color: #f8fafc; margin: 0; height: 100vh; overflow: hidden; }
    #root { height: 100%; } 
    .fade-enter { animation: fadeIn 0.8s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .btn-quiet { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.8); transition: all 0.3s ease; }
    .btn-quiet:hover:not(:disabled) { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2); }
    .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.4s ease; }
    .quiet-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; padding: 12px; outline: none; width: 100%; transition: all 0.3s ease; }
    .quiet-input:focus { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.3); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    
    /* 本の綴じ目（ノド）の立体感を表現するシャドウ */
    .book-gutter-left { box-shadow: inset -15px 0 20px -15px rgba(0,0,0,0.5); }
    .book-gutter-right { box-shadow: inset 15px 0 20px -15px rgba(0,0,0,0.5); }
    
    /* 表紙プレビュー用のスタイル */
    .cover-shadow { box-shadow: 0 10px 30px -5px rgba(0,0,0,0.7); }
    
    /* カラーパレットの選択用 border */
    .color-swatch { width: 32px; height: 32px; rounded-full: true; cursor: pointer; transition: all 0.3s ease; }
    .color-swatch.selected { ring: 2px; ring-offset: 2px; ring-offset-color: #0f172a; ring-color: #f8fafc; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    
    // ▼▼▼ あなたのウェブアプリURL ▼▼▼
    const UX_CONFIG = { GAS_API_URL: "https://script.google.com/macros/s/AKfycbzTdIahyO_f_PF55TsaKkmWnV37tl1q77lv0L5SRkVCzvAOL4RDgjFNb6gO08O-GwtY/exec" };

    const apiFetch = async (action, data = {}) => {
      const res = await fetch(UX_CONFIG.GAS_API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action, ...data }) });
      const json = await res.json();
      if (!json.success) throw new Error(json.error);
      return json.data;
    };

    const getDirectImageUrl = (url) => {
      if (!url) return "";
      let fileId = "";
      const matchD = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      const matchId = url.match(/id=([a-zA-Z0-9_-]+)/);
      if (matchD) fileId = matchD[1]; else if (matchId) fileId = matchId[1];
      if (fileId) return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1000`;
      return url;
    };

    // Koeが定義する表紙の3色（濃紺、生成り、墨グレー）
    const BOOK_COLORS = {
      "slate-950": { bg: "bg-slate-950", text: "text-white/90", swatch: "bg-slate-950", border: "border-slate-800" },
      "f5f5f0": { bg: "bg-[#f5f5f0]", text: "text-slate-900", swatch: "bg-[#f5f5f0]", border: "border-slate-300" },
      "slate-800": { bg: "bg-slate-800", text: "text-white/90", swatch: "bg-slate-800", border: "border-slate-700" }
    };

    function KoeBookshelf() {
      const [isLoading, setIsLoading] = useState(true);
      const [accessError, setAccessError] = useState("");
      const [mode, setMode] = useState("grid"); 
      const [activeChapter, setActiveChapter] = useState("すべて");
      const [bookData, setBookData] = useState({ user: {}, progress: { currentIndex: 0, total: 30 }, pages: [] });
      const [selectedSeq, setSelectedSeq] = useState(null);

      const [bookSettings, setBookSettings] = useState({
        title: "",
        author: "",
        colorKey: "slate-950",
        coverPhotoUrl: null
      });

      const loadData = async () => {
        const id = localStorage.getItem('koe_user_id');
        if (!id) { setAccessError("まだ物語が始まっていません。先に「語るアプリ」を開始してください。"); setIsLoading(false); return; }
        try { 
          const data = await apiFetch('getBookshelfData', { user_id: id }); 
          setBookData(data);
          setBookSettings(prev => ({
            ...prev,
            title: prev.title || "", // タイトルはあえて空にして提案を見せる
            author: prev.author || data.user.name
          }));
        }
        catch (e) { setAccessError("読み込みに失敗しました。"); } finally { setIsLoading(false); }
      };

      useEffect(() => { loadData(); }, []);

      if (isLoading) return <div className="h-screen w-screen flex items-center justify-center text-white/30 text-sm tracking-widest bg-[#0f172a]">書架を開いています...</div>;
      if (accessError) return <div className="h-screen w-screen flex items-center justify-center px-6 text-center bg-[#0f172a]"><p className="text-white/40">{accessError}</p></div>;

      return (
        <div className="h-full flex flex-col bg-[#0f172a] text-white overflow-hidden fade-enter">
          <header className="flex justify-between items-center px-10 py-5 border-b border-white/5 bg-white/[0.01] shrink-0">
            <div>
              <p className="text-white/50 text-xs tracking-widest mb-1">{bookData.user.name}さんの物語</p>
              <p className="text-white/90 text-sm font-serif">{bookData.progress.currentIndex} / {bookData.progress.total} ページ</p>
            </div>
            <div className="flex gap-8">
              <button onClick={() => setMode("cover")} className="text-white/40 hover:text-white/80 text-[0.8rem] tracking-widest transition-colors">本の表紙</button>
              <button className="text-white/40 hover:text-white/80 text-[0.8rem] tracking-widest transition-colors">家族とつなぐ</button>
            </div>
          </header>

          <div className="flex flex-1 overflow-hidden">
            <aside className="w-64 border-r border-white/5 p-8 flex flex-col bg-white/[0.005] shrink-0">
              <div className="flex-1 space-y-1">
                {["すべて", "思い出す", "積み重ねる", "関係性", "手渡す"].map(c => (
                  <button key={c} onClick={() => { setActiveChapter(c); setMode("grid"); }} className={`block w-full text-left py-2.5 px-4 rounded-md text-[0.85rem] transition-all ${activeChapter === c ? "bg-white/[0.06] text-white/80" : "text-white/40 hover:text-white/70"}`}>{c}</button>
                ))}
              </div>
              <button onClick={() => setMode("cover")} className={`pt-8 border-t border-white/5 mt-auto text-sm tracking-widest flex justify-between items-center ${bookData.progress.currentIndex >= 20 ? "text-amber-400" : "text-white/20"}`}>
                <span>本の仕上げに進む</span> <span>→</span>
              </button>
            </aside>

            <main className="flex-1 overflow-y-auto relative bg-[#0d1321]">
              {mode === "grid" && <GridView pages={activeChapter === "すべて" ? bookData.pages : bookData.pages.filter(p => p.chapter === activeChapter)} onOpen={(seq) => { setSelectedSeq(seq); setMode("page"); }} activeChapter={activeChapter} />}
              {mode === "page" && <PageDetailView pages={bookData.pages} selectedSeq={selectedSeq} onBack={() => setMode("grid")} onNavigate={setSelectedSeq} onRefresh={loadData} />}
              {mode === "finalize" && <FinalizeView progress={bookData.progress} onBack={() => setMode("grid")} onProceed={() => setMode("cover")} />}
              {mode === "cover" && <BookCoverView bookData={bookData} settings={bookSettings} setSettings={setBookSettings} onBack={() => setMode("grid")} onProceed={() => setMode("preview")} />}
              {mode === "preview" && <PreviewView pages={bookData.pages} progress={bookData.progress} settings={bookSettings} onBack={() => setMode("cover")} onNext={() => setMode("complete")} />}
              {mode === "complete" && <OrderCompleteView onBack={() => setMode("grid")} />}
            </main>
          </div>
        </div>
      );
    }

    // ==========================================
    // 表紙デザイン（儀式）画面
    // ==========================================
    function BookCoverView({ bookData, settings, setSettings, onBack, onProceed }) {
      const photoPages = useMemo(() => bookData.pages.filter(p => p.has_photo), [bookData.pages]);
      const bookColor = BOOK_COLORS[settings.colorKey];
      
      // ▼ 追加：静かで邪魔にならないタイトルの提案リスト
      const titleSuggestions = [
        "わたしの歩いてきた道",
        "家族に残すことば",
        "これまでと、これから",
        "私のものがたり"
      ];

      return (
        <div className="max-w-6xl mx-auto p-10 pb-20 fade-enter relative">
          <button onClick={onBack} className="mb-10 text-white/30 hover:text-white/70 text-sm tracking-widest transition-colors flex items-center gap-2">← 戻る</button>
          
          <h2 className="text-xl mb-12 font-serif tracking-widest text-center text-white/90">本のかたちを整える</h2>

          <div className="flex flex-col md:flex-row gap-16 items-start justify-center">
            
            {/* 左側：表紙プレビュー */}
            <div className={`shrink-0 w-full max-w-[360px] aspect-[1/1.414] ${bookColor.bg} ${bookColor.text} rounded border ${bookColor.border} cover-shadow flex flex-col items-center justify-between p-10 relative overflow-hidden transition-all duration-500`}>
                <div className="mt-16 text-center">
                    <h1 className="text-xl md:text-2xl font-serif leading-relaxed px-4 tracking-wider whitespace-pre-wrap">
                      {settings.title || "（タイトル未入力）"}
                    </h1>
                </div>
                {settings.coverPhotoUrl ? (
                    <img src={getDirectImageUrl(settings.coverPhotoUrl)} className="w-32 h-32 md:w-40 md:h-40 object-cover rounded opacity-90 shadow-lg" alt="表紙の風景" />
                ) : (
                    <div className="w-32 h-32 md:w-40 md:h-40 flex flex-col items-center justify-center border-l border-white/10 opacity-20 writing-vertical-rl text-[0.6rem] tracking-[0.4em] font-serif">
                      KOE BOOK
                    </div>
                )}
                <p className="text-[0.8rem] tracking-[0.3em] font-serif mb-4">{settings.author || bookData.user.name}</p>
            </div>

            {/* 右側：設定フォーム */}
            <div className="flex-1 w-full max-w-lg space-y-12">
                <div>
                  <p className="text-white/60 text-[0.85rem] tracking-widest mb-3 font-serif">この物語に、名前をつけてください</p>
                  <input 
                    className="quiet-input text-[1.1rem] tracking-wider" 
                    value={settings.title} 
                    onChange={e => setSettings({...settings, title: e.target.value})} 
                    placeholder="" 
                  />
                  {/* ▼ 追加：未入力の時だけ表示される、そっと添えられた提案リスト */}
                  {!settings.title && (
                    <div className="mt-5 fade-enter">
                      <p className="text-white/30 text-[0.65rem] tracking-widest mb-3">迷ったときは、これらの名前から選ぶこともできます</p>
                      <div className="flex flex-wrap gap-2">
                        {titleSuggestions.map(s => (
                          <button 
                            key={s} 
                            onClick={() => setSettings({...settings, title: s})}
                            className="text-white/40 hover:text-white/80 bg-white/[0.02] hover:bg-white/[0.05] border border-white/10 hover:border-white/30 rounded-full px-4 py-2 text-[0.75rem] tracking-widest transition-all font-serif"
                          >
                            {s}
                          </button>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
                
                <div>
                  <p className="text-white/60 text-[0.85rem] tracking-widest mb-3 font-serif">この本の語り手</p>
                  <input className="quiet-input text-[1rem]" value={settings.author} onChange={e => setSettings({...settings, author: e.target.value})} />
                </div>

                <div className="border-t border-white/5 pt-10">
                  <p className="text-white/60 text-xs tracking-widest mb-4">表紙の色を選ぶ</p>
                  <div className="flex gap-5">
                    {Object.entries(BOOK_COLORS).map(([key, value]) => (
                        <div key={key} onClick={() => setSettings({...settings, colorKey: key})} className={`w-9 h-9 rounded-full ${value.swatch} cursor-pointer transition-all ${settings.colorKey === key ? 'ring-2 ring-offset-2 ring-offset-[#0d1321] ring-white' : 'ring-1 ring-white/10'}`}></div>
                    ))}
                  </div>
                </div>

                {photoPages.length > 0 && (
                    <div className="border-t border-white/5 pt-10 pb-4">
                        <p className="text-white/60 text-xs tracking-widest mb-4">アルバムから表紙の一枚を選ぶ</p>
                        <div className="grid grid-cols-4 md:grid-cols-5 gap-3">
                            <div onClick={() => setSettings({...settings, coverPhotoUrl: null})} className={`aspect-square bg-white/5 border rounded flex flex-col items-center justify-center cursor-pointer transition-all ${settings.coverPhotoUrl === null ? 'border-amber-400' : 'border-white/10 opacity-50 hover:opacity-100'}`}>
                                <p className="text-white/40 text-[0.6rem] tracking-widest writing-vertical-rl opacity-50 font-serif">なし</p>
                            </div>
                            {photoPages.map(p => (
                                <img key={p.sequence_order} onClick={() => setSettings({...settings, coverPhotoUrl: p.photo_url})} src={getDirectImageUrl(p.photo_url)} className={`aspect-square object-cover rounded cursor-pointer transition-all hover:scale-105 ${settings.coverPhotoUrl === p.photo_url ? 'ring-2 ring-amber-400 ring-offset-1 ring-offset-[#0d1321]' : 'opacity-60 hover:opacity-100'}`} alt={`PAGE ${p.sequence_order}`} />
                            ))}
                        </div>
                    </div>
                )}

                <div className="pt-8 flex flex-col items-center">
                    <button onClick={onProceed} className="btn-quiet w-full py-5 rounded-xl text-white shadow-lg tracking-[0.2em]">見開きを確認する</button>
                    <button onClick={onBack} className="mt-8 text-white/30 hover:text-white/60 transition-colors text-sm underline underline-offset-4 tracking-widest">書架に戻り、もう少し語る</button>
                </div>
            </div>

          </div>
        </div>
      );
    }

    // --- その他コンポーネント（PreviewView, PageDetailView, GridViewなど）はすべてそのまま ---

    function PreviewView({ pages, progress, settings, onBack, onNext }) {
      const [index, setIndex] = useState(0); 
      const answeredPages = useMemo(() => pages.filter(p => p.is_answered), [pages]);
      const totalPagesInView = answeredPages.length + 1;
      const handlePrev = () => setIndex(i => Math.max(0, i - 1));
      const handleNext = () => setIndex(i => Math.min(totalPagesInView - 1, i + 1));
      const bookColor = BOOK_COLORS[settings.colorKey];

      return (
        <div className="max-w-5xl mx-auto pt-10 pb-20 text-center fade-enter relative">
          <header className="absolute top-0 left-0 right-0 flex justify-between items-center p-10 z-20">
            <button onClick={onBack} className="text-white/30 hover:text-white/70 text-sm tracking-widest transition-colors flex items-center gap-2">← 表紙に戻る</button>
            <p className="text-white/40 text-xs tracking-[0.3em] font-serif">あなたの物語は、こうして本になります</p>
            <div className="w-16"></div>
          </header>

          <div className="w-full flex flex-col items-center justify-center min-h-[70vh] pt-20">
            <div className="flex justify-center items-stretch gap-1 md:gap-2 mb-16 px-4 shrink-0 scale-90 md:scale-100 transition-transform">
                {index === 0 ? (
                    <div className="flex justify-center items-stretch gap-1 md:gap-2 fade-enter">
                        <div className={`shrink-0 w-full max-w-[280px] md:max-w-[320px] aspect-[1/1.414] ${bookColor.bg} ${bookColor.text} rounded border border-black/10 shadow-2xl flex flex-col items-center justify-between p-8 md:p-10 relative overflow-hidden book-gutter-left`}>
                            <div className="mt-16 text-center"><h1 className="text-xl font-serif leading-relaxed px-4 tracking-wider whitespace-pre-wrap">{settings.title || "（タイトル未設定）"}</h1></div>
                            {settings.coverPhotoUrl ? (
                                <img src={getDirectImageUrl(settings.coverPhotoUrl)} className="w-32 h-32 md:w-40 md:h-40 object-cover rounded opacity-80 shadow-md" alt="表紙の風景" />
                            ) : (
                                <div className="w-32 h-32 md:w-40 md:h-40 flex items-center justify-center writing-vertical-rl text-[0.6rem] tracking-[0.4em] font-serif opacity-10">KOE BOOK</div>
                            )}
                            <p className="text-[0.8rem] tracking-[0.3em] font-serif mb-4">{settings.author}</p>
                        </div>
                        <div className={`w-full max-w-[280px] md:max-w-[320px] aspect-[1/1.414] ${bookColor.bg} rounded border border-black/10 shadow-2xl p-8 relative flex flex-col items-center justify-center book-gutter-right`}>
                           <p className={`${bookColor.text} opacity-10 text-[0.6rem] tracking-[0.4em] font-serif writing-vertical-rl`}>KOE BOOKS</p>
                        </div>
                    </div>
                ) : (
                    <div className="flex justify-center items-stretch gap-1 md:gap-2 fade-enter">
                        <div className="shrink-0 w-full max-w-[280px] md:max-w-[320px] aspect-[1/1.414] bg-white/[0.04] border border-white/10 rounded-l-xl shadow-2xl flex flex-col items-center justify-center p-8 relative overflow-hidden book-gutter-left">
                            {answeredPages[index-1] && answeredPages[index-1].has_photo ? (
                                <img src={getDirectImageUrl(answeredPages[index-1].photo_url)} className="w-full h-auto max-h-full object-contain opacity-80 rounded shadow-md" alt="添えられた風景" />
                            ) : (
                                <p className="text-white/10 text-[0.6rem] tracking-[0.4em] font-serif writing-vertical-rl opacity-30">Page {answeredPages[index-1] ? answeredPages[index-1].sequence_order : index}</p>
                            )}
                        </div>
                        <div className="w-full max-w-[280px] md:max-w-[320px] aspect-[1/1.414] bg-white/[0.04] border border-white/10 rounded-r-xl shadow-2xl p-8 text-left relative flex flex-col book-gutter-right overflow-hidden">
                          {answeredPages[index-1] ? (
                            <div className="fade-enter h-full flex flex-col">
                              <p className="text-white/30 text-[0.6rem] tracking-[0.2em] font-serif mb-6 border-b border-white/10 pb-2shrink-0">PAGE {answeredPages[index-1].sequence_order}</p>
                              <p className="text-white/80 text-[0.85rem] font-serif leading-relaxed mb-6 shrink-0">{answeredPages[index-1].question_text}</p>
                              <div className="flex-1 overflow-hidden relative">
                                <p className="text-white/60 text-[0.75rem] leading-[2.4] font-serif whitespace-pre-wrap">{answeredPages[index-1].transcript_edited}</p>
                                <div className="absolute bottom-0 left-0 right-0 h-16 bg-gradient-to-t from-[#101625] to-transparent z-10"></div>
                              </div>
                            </div>
                          ) : (
                            <div className="flex-1 flex flex-col justify-center items-center opacity-30"><p className="text-white/40 text-[0.75rem] tracking-widest font-serif text-center">KOE BOOK</p></div>
                          )}
                        </div>
                    </div>
                )}
            </div>

            <div className="flex justify-center items-center gap-12 mb-16 shrink-0">
              <button onClick={handlePrev} disabled={index === 0} className="text-white/40 hover:text-white/80 disabled:opacity-20 transition-colors tracking-widest text-sm font-serif">← 表紙</button>
              <p className="text-white/30 text-xs tracking-[0.2em] font-serif">{index === 0 ? "COV" : index} / {answeredPages.length}</p>
              <button onClick={handleNext} disabled={index === answeredPages.length} className="text-white/40 hover:text-white/80 disabled:opacity-20 transition-colors tracking-widest text-sm font-serif">次へ →</button>
            </div>
          </div>

          <div className="max-w-md mx-auto pt-10 border-t border-white/5">
            <p className="text-white/50 text-sm mb-12 tracking-widest leading-relaxed whitespace-pre-wrap font-serif">
              {progress.currentIndex >= 20 ? "この内容で、一冊の本として十分です。" : "もう少し語ると、物語はさらに深くなります。"}
            </p>
            <div className="flex flex-col gap-5 items-center px-4">
              <button onClick={onNext} className="btn-quiet w-full py-6 rounded-xl text-white tracking-[0.2em] shadow-xl text-[1rem]">この物語を、本として残す</button>
              <button onClick={() => window.location.reload()} className="text-white/30 hover:text-white/60 transition-colors text-sm underline underline-offset-4 tracking-widest block text-center mt-2">もう少し語る（書架に戻る）</button>
            </div>
          </div>
        </div>
      );
    }

    function GridView({ pages, onOpen, activeChapter }) {
      return (
        <div className="max-w-5xl mx-auto p-10 pb-20">
          <h2 className="text-2xl text-white/90 tracking-widest font-serif mb-10">{activeChapter}</h2>
          <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            {pages.map(p => (
              <div key={p.sequence_order} onClick={() => onOpen(p.sequence_order)} className={`glass-card p-6 rounded-xl flex flex-col h-52 relative overflow-hidden transition-all duration-500 cursor-pointer group hover:bg-white/[0.03] ${p.is_answered ? '' : 'opacity-40 hover:opacity-60'}`}>
                <div className="flex justify-between items-start mb-4">
                  <p className="text-[0.65rem] text-white/40 font-serif tracking-[0.2em]">PAGE {p.sequence_order}</p>
                  <div className={`rounded-full ${p.has_photo ? "w-2.5 h-2.5 border-2 border-[#0f172a] bg-amber-500/90 shadow-[0_0_10px_rgba(245,158,11,0.5)]" : p.is_answered ? "w-2 h-2 bg-white/40 shadow-[0_0_6px_rgba(255,255,255,0.2)]" : "w-2 h-2 border border-white/20"}`}></div>
                </div>
                <p className="text-[0.95rem] leading-[1.65] text-white/60 line-clamp-3 flex-1 font-serif transition-colors group-hover:text-white/80">{p.is_answered ? p.extracted_snippet : "まだ、このページは静かなままです"}</p>
                <p className="text-[0.75rem] text-white/40 truncate mt-4 tracking-widest">{p.question_text}</p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function PageDetailView({ pages, selectedSeq, onBack, onNavigate, onRefresh }) {
      const [isUploading, setIsUploading] = useState(false);
      const fileRef = useRef(null);
      const pageIndex = pages.findIndex(p => p.sequence_order === selectedSeq);
      const page = pages[pageIndex];
      const prevPage = pageIndex > 0 ? pages[pageIndex - 1] : null;
      const nextPage = pageIndex < pages.length - 1 ? pages[pageIndex + 1] : null;
      const isPrevChapterChange = prevPage && prevPage.chapter !== page.chapter;
      const isNextChapterChange = nextPage && nextPage.chapter !== page.chapter;
      const shorten = (text, max = 24) => text && text.length > max ? text.slice(0, max) + "…" : text;

      const handleUpload = (e) => {
        const file = e.target.files[0]; if (!file) return;
        setIsUploading(true);
        const reader = new FileReader();
        reader.onload = async (event) => {
          try {
            await apiFetch('uploadImage', { user_id: localStorage.getItem('koe_user_id'), answer_id: page.answer_id, base64Data: event.target.result, fileName: file.name });
            await onRefresh();
          } catch (e) { alert("保存に失敗しました。"); } finally { setIsUploading(false); }
        };
        reader.readAsDataURL(file);
      };

      if (!page) return null;

      return (
        <div className="max-w-3xl mx-auto p-10 pb-20 fade-enter relative bg-[#101625]">
          <button onClick={onBack} className="mb-10 text-white/30 hover:text-white/70 text-sm tracking-widest transition-colors flex items-center gap-2">← 書架に戻る</button>
          
          <div className="text-center mb-10">
            <p className="text-white/30 text-xs tracking-[0.3em] font-serif mb-4">PAGE {page.sequence_order}</p>
            <h1 className="text-xl text-white/70 font-serif leading-relaxed px-4 whitespace-pre-wrap">{page.question_text}</h1>
          </div>

          {page.is_answered ? (
            <div className="fade-enter h-full flex flex-col">
              <div className="mb-10 p-6 bg-white/[0.04] border-l-2 border-amber-500/50 rounded-r-lg shadow-sm shrink-0">
                <p className="text-amber-50/90 text-[0.95rem] italic tracking-widest leading-relaxed font-serif">{page.ai_mirror_text}</p>
              </div>
              <p className="text-white/90 text-[1.05rem] leading-[2.4] font-serif whitespace-pre-wrap mb-16">{page.transcript_edited}</p>
              
              <div className="border-t border-white/5 pt-10 flex flex-col items-center shrink-0 mt-auto">
                <p className="text-white/40 text-[0.8rem] mb-6 tracking-widest text-center font-serif">この記憶にまつわる、アルバムの中の一枚を加えられます</p>
                {isUploading ? <p className="animate-pulse text-white/40 text-sm tracking-widest">記憶を定着させています...</p> : (
                  <div className="flex flex-col items-center w-full">
                    {page.has_photo && (
                      <div className="w-full max-w-lg relative group rounded-xl overflow-hidden border border-white/10 shadow-xl mb-8">
                        <div className="absolute top-4 left-4 bg-[#0f172a]/70 backdrop-blur-sm px-3 py-1.5 rounded border border-white/10 z-10 pointer-events-none">
                          <p className="text-[0.6rem] tracking-[0.3em] text-white/80 font-serif">MEMORY</p>
                        </div>
                        <img src={getDirectImageUrl(page.photo_url)} className="w-full h-auto object-cover opacity-90 transition-all duration-500 group-hover:opacity-50 group-hover:scale-[1.02]" alt="あのときの景色" />
                        <button onClick={() => fileRef.current.click()} className="absolute inset-0 w-full h-full flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-20">
                          <span className="text-white/90 text-sm tracking-widest bg-black/60 px-6 py-3 rounded-full border border-white/20 backdrop-blur-sm">写真を変更する</span>
                        </button>
                      </div>
                    )}
                    {!page.has_photo && <button onClick={() => fileRef.current.click()} className="btn-quiet px-8 py-4 rounded-full text-sm tracking-widest shadow-sm font-serif">+ 風景を添える</button>}
                  </div>
                )}
                <input type="file" accept="image/*" className="hidden" ref={fileRef} onChange={handleUpload} />
              </div>
            </div>
          ) : (
            <div className="text-center py-20 fade-enter flex-1 flex flex-col justify-center items-center">
              <p className="text-white/40 text-[0.95rem] tracking-widest mb-6 font-serif">まだ、このページは静かなままです</p>
              <p className="text-white/30 text-[0.85rem] tracking-widest italic font-serif">言葉になるときを、待っています</p>
              <div className="mt-16 flex justify-center">
                <button onClick={() => { window.location.href = `index.html?sequence=${page.sequence_order}`; }} className="btn-quiet px-10 py-4 rounded-full tracking-widest text-sm hover:text-white hover:bg-white/[0.05] transition-all font-serif">この問いについて語る</button>
              </div>
            </div>
          )}

          <div className="mt-20 pt-8 border-t border-white/10 grid grid-cols-2 gap-8 shrink-0">
            <div>
              {prevPage && (
                <button onClick={() => onNavigate(prevPage.sequence_order)} className="w-full text-left px-4 py-4 rounded-xl hover:bg-white/[0.03] transition-colors group">
                  <p className="text-white/30 text-[0.65rem] tracking-[0.2em] font-serif mb-2 transition-colors group-hover:text-white/50">{isPrevChapterChange ? "前の章" : "前のページ"}</p>
                  <p className="text-white/70 text-[0.9rem] tracking-widest font-serif mb-1 transition-colors group-hover:text-white/90">{isPrevChapterChange ? prevPage.chapter : `PAGE ${prevPage.sequence_order}`}</p>
                  {!isPrevChapterChange && <p className="text-white/40 text-[0.75rem] tracking-widest transition-colors group-hover:text-white/60 font-serif">{shorten(prevPage.question_text)}</p>}
                </button>
              )}
            </div>
            <div>
              {nextPage && (
                <button onClick={() => onNavigate(nextPage.sequence_order)} className="w-full text-right px-4 py-4 rounded-xl hover:bg-white/[0.03] transition-colors group flex flex-col items-end">
                  <p className="text-white/30 text-[0.65rem] tracking-[0.2em] font-serif mb-2 transition-colors group-hover:text-white/50">{isNextChapterChange ? "次の章" : "次のページ"}</p>
                  <p className="text-white/70 text-[0.9rem] tracking-widest font-serif mb-1 transition-colors group-hover:text-white/90">{isNextChapterChange ? nextPage.chapter : `PAGE ${nextPage.sequence_order}`}</p>
                  {!isNextChapterChange && <p className="text-white/40 text-[0.75rem] tracking-widest transition-colors group-hover:text-white/60 font-serif">{shorten(nextPage.question_text)}</p>}
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    function FinalizeView({ progress, onBack, onProceed }) {
      return (
        <div className="max-w-2xl mx-auto p-10 pb-20 text-center fade-enter">
          <h2 className="text-2xl mb-4 font-serif tracking-widest leading-loose">現在、{progress ? progress.currentIndex : 0}ページが<br/>編まれています</h2>
          <p className="text-white/40 text-sm mb-16 tracking-widest">語られた言葉が、一冊の本になるだけの量まで積み重なっています。</p>
          <button onClick={onProceed} className="btn-quiet w-full py-6 rounded-xl text-white text-lg shadow-xl tracking-[0.3em]">本の仕上げに進む</button>
          <button onClick={onBack} className="mt-10 text-white/30 hover:text-white/60 transition-colors underline underline-offset-4 text-sm tracking-widest">書架に戻り、もう少し語る</button>
        </div>
      );
    }

    function OrderCompleteView({ onBack }) {
      return (
        <div className="max-w-xl mx-auto p-20 pb-32 text-center fade-enter flex h-full flex-col justify-center items-center">
          <div className="mb-10 text-5xl opacity-40">📚</div>
          <h2 className="text-xl mb-6 font-serif tracking-widest text-white/90 leading-relaxed">この物語を、<br/>本として残す準備ができました。</h2>
          <p className="text-white/40 text-sm leading-loose mb-16 tracking-widest font-serif">ここから一冊の本として、丁寧に仕上げてお届けします。<br/>完成まで、楽しみにお待ちください。</p>
          <button onClick={onBack} className="btn-quiet px-12 py-4 rounded-full text-sm tracking-widest font-serif">書架に戻る</button>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<KoeBookshelf />);
  </script>
</body>
</html>
