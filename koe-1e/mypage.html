<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Koe Bookshelf</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body { font-family:'Noto Serif JP',serif; background:#0f172a; color:#f8fafc; margin:0; height:100vh; overflow:hidden; }
    #root { height:100%; }
    .fade-enter { animation:fadeIn .8s ease-out forwards; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .glass-card { background:rgba(255,255,255,.025); border:1px solid rgba(255,255,255,.06); }
    .btn-quiet { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.12); color:rgba(255,255,255,.8); }
    .btn-quiet:hover { background:rgba(255,255,255,.08); }
    audio { width:100%; height:36px; opacity:.75; }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useEffect, useMemo, useState } = React;

const SUPABASE_URL = "https://wquxjeqkumossjxehdop.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndxdXhqZXFrdW1vc3NqeGVoZG9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTEyMjksImV4cCI6MjA5MjU4NzIyOX0.wImRfRH2cr-w1uh2_c3vSS0_t4pHDeRWmWHZre1WbT4";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function KoeBookshelf() {
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState("");
  const [profile, setProfile] = useState(null);
  const [questions, setQuestions] = useState([]);
  const [answers, setAnswers] = useState([]);
  const [assets, setAssets] = useState([]);
  const [mode, setMode] = useState("grid");
  const [selectedSeq, setSelectedSeq] = useState(null);
  const [activeChapter, setActiveChapter] = useState("すべて");

  useEffect(() => {
    loadData();
  }, []);

  const loadData = async () => {
    setLoading(true);
    setError("");

    try {
      const { data: { session } } = await supabaseClient.auth.getSession();

      if (!session) {
        setError("ログイン情報が見つかりません。先に語るアプリを開いてください。");
        setLoading(false);
        return;
      }

      const userId = session.user.id;

      const { data: profileData, error: profileError } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", userId)
        .maybeSingle();

      if (profileError) throw profileError;

      const { data: qData, error: qError } = await supabaseClient
        .from("questions")
        .select("*")
        .order("sequence_order", { ascending: true });

      if (qError) throw qError;

      const { data: aData, error: aError } = await supabaseClient
        .from("answers")
        .select("*")
        .eq("user_id", userId)
        .order("sequence_order", { ascending: true });

      if (aError) throw aError;

      const answerIds = (aData || []).map(a => a.id);

      let assetData = [];
      if (answerIds.length > 0) {
        const { data: mData, error: mError } = await supabaseClient
          .from("media_assets")
          .select("*")
          .in("answer_id", answerIds);

        if (mError) throw mError;
        assetData = mData || [];
      }

      const signedAssets = await Promise.all(assetData.map(async asset => {
        if (asset.asset_type !== "audio" || !asset.storage_path) return asset;

        const { data } = await supabaseClient.storage
          .from("audio")
          .createSignedUrl(asset.storage_path, 60 * 30);

        return {
          ...asset,
          signed_url: data?.signedUrl || null
        };
      }));

      setProfile(profileData || { id: userId, name: "あなた", current_sequence: 1 });
      setQuestions(qData || []);
      setAnswers(aData || []);
      setAssets(signedAssets || []);
    } catch (e) {
      console.error(e);
      setError("書架の読み込みに失敗しました。");
    } finally {
      setLoading(false);
    }
  };

  const pages = useMemo(() => {
    return questions.map(q => {
      const answer = answers.find(a => a.question_id === q.id || a.sequence_order === q.sequence_order);
      const audio = answer ? assets.find(m => m.answer_id === answer.id && m.asset_type === "audio") : null;

      return {
        sequence_order: q.sequence_order,
        chapter: q.chapter,
        question_id: q.id,
        question_text: q.content,
        is_answered: !!answer,
        answer,
        audio,
        ai_mirror: answer?.ai_mirror || "",
        transcript_edited: answer?.transcript_edited || "",
        snippet: answer?.snippet || ""
      };
    });
  }, [questions, answers, assets]);

  const filteredPages = activeChapter === "すべて"
    ? pages
    : pages.filter(p => p.chapter === activeChapter);

  const progressCount = answers.length;
  const totalCount = questions.length || 30;

  if (loading) {
    return <div className="h-screen flex items-center justify-center text-white/30 tracking-widest">書架を開いています...</div>;
  }

  if (error) {
    return (
      <div className="h-screen flex flex-col items-center justify-center text-center px-6">
        <p className="text-white/50 mb-8">{error}</p>
        <button onClick={() => location.href = "v1.html"} className="btn-quiet rounded-full px-8 py-4 text-sm">
          語るアプリを開く
        </button>
      </div>
    );
  }

  return (
    <div className="h-full flex flex-col fade-enter">
      <header className="flex justify-between items-center px-8 py-5 border-b border-white/5">
        <div>
          <p className="text-white/50 text-xs tracking-widest mb-1">{profile?.name || "あなた"}さんの物語</p>
          <p className="text-white/90 text-sm">{progressCount} / {totalCount} ページ</p>
        </div>
        <button onClick={() => location.href = "v1.html"} className="btn-quiet rounded-full px-6 py-3 text-xs tracking-widest">
          続きを語る
        </button>
      </header>

      <div className="flex flex-1 overflow-hidden">
        <aside className="w-56 border-r border-white/5 p-6 hidden md:block">
          {["すべて", "思い出す", "積み重ねる", "関係性", "手渡す"].map(c => (
            <button
              key={c}
              onClick={() => { setActiveChapter(c); setMode("grid"); }}
              className={`block w-full text-left py-3 px-4 rounded-md text-sm ${activeChapter === c ? "bg-white/[0.07] text-white/80" : "text-white/40"}`}
            >
              {c}
            </button>
          ))}
        </aside>

        <main className="flex-1 overflow-y-auto bg-[#0d1321]">
          {mode === "grid" && (
            <GridView
              pages={filteredPages}
              activeChapter={activeChapter}
              onOpen={(seq) => { setSelectedSeq(seq); setMode("page"); }}
            />
          )}

          {mode === "page" && (
            <PageDetail
              page={pages.find(p => p.sequence_order === selectedSeq)}
              onBack={() => setMode("grid")}
            />
          )}
        </main>
      </div>
    </div>
  );
}

function GridView({ pages, activeChapter, onOpen }) {
  return (
    <div className="max-w-5xl mx-auto p-8 pb-20">
      <h2 className="text-2xl text-white/90 tracking-widest mb-8">{activeChapter}</h2>

      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
        {pages.map(p => (
          <div
            key={p.sequence_order}
            onClick={() => onOpen(p.sequence_order)}
            className={`glass-card p-6 rounded-xl h-56 cursor-pointer ${p.is_answered ? "" : "opacity-40"}`}
          >
            <div className="flex justify-between mb-4">
              <p className="text-white/35 text-xs tracking-widest">PAGE {p.sequence_order}</p>
              <span className={`w-2 h-2 rounded-full ${p.is_answered ? "bg-white/50" : "border border-white/30"}`}></span>
            </div>

            <p className="text-white/70 text-sm leading-loose line-clamp-4">
              {p.is_answered ? (p.snippet || p.transcript_edited || "語りが保存されています") : "まだ、このページは静かなままです"}
            </p>

            <p className="text-white/35 text-xs mt-5 line-clamp-2">
              {p.question_text}
            </p>
          </div>
        ))}
      </div>
    </div>
  );
}

function PageDetail({ page, onBack }) {
  if (!page) return null;

  return (
    <div className="max-w-3xl mx-auto p-8 pb-20 fade-enter">
      <button onClick={onBack} className="text-white/35 mb-10 text-sm tracking-widest">← 書架に戻る</button>

      <p className="text-white/30 text-xs tracking-[0.3em] mb-4 text-center">PAGE {page.sequence_order}</p>
      <h1 className="text-white/80 text-xl leading-loose text-center mb-12">{page.question_text}</h1>

      {page.is_answered ? (
        <>
          <div className="mb-10 p-5 bg-white/[0.04] border-l-2 border-amber-500/50 rounded-r-lg">
            <p className="text-amber-50/90 text-sm tracking-widest leading-loose">
              {page.ai_mirror || "ひとつの時間が、形になっています"}
            </p>
          </div>

          <p className="text-white/85 text-[1.05rem] leading-[2.4] whitespace-pre-wrap mb-10">
            {page.transcript_edited || "（本文はまだありません）"}
          </p>

          {page.audio?.signed_url && (
            <div className="glass-card rounded-xl p-5">
              <p className="text-white/35 text-xs tracking-widest mb-3">ORIGINAL VOICE</p>
              <audio controls src={page.audio.signed_url}></audio>
            </div>
          )}
        </>
      ) : (
        <div className="text-center py-20">
          <p className="text-white/40 mb-10">まだ、このページは静かなままです。</p>
          <button onClick={() => location.href = "v1.html"} className="btn-quiet rounded-full px-8 py-4 text-sm">
            この問いについて語る
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<KoeBookshelf />);
</script>
</body>
</html>
