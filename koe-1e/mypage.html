<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koe Bookshelf (PC版 Myページ)</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Noto Serif JP', serif;
      background-color: #0f172a;
      color: #f8fafc;
      margin: 0;
      height: 100vh;
      overflow: hidden;
    }
    .fade-enter { animation: fadeIn 0.8s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .btn-quiet {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
      transition: all 0.3s ease;
    }
    .btn-quiet:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }
    .btn-quiet:disabled { opacity: 0.3; cursor: not-allowed; }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.4s ease;
    }
    .glass-card:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // ▼▼▼ あなたのGASウェブアプリURLに書き換えてください ▼▼▼
    const UX_CONFIG = { GAS_API_URL: "https://script.google.com/macros/s/AKfycbwqOWIjPH3HfVLQIYSO-Xu7G-bT_oGNgGJnT-zBDBhT9hfWIJ9Yr7u-lAcBR5nFMNqT/exec" };
    
    const apiFetch = async (action, data = {}) => {
      const res = await fetch(UX_CONFIG.GAS_API_URL, { method: 'POST', body: JSON.stringify({ action, ...data }) });
      const json = await res.json();
      if (!json.success) throw new Error(json.error);
      return json.data;
    };

    // ==========================================
    // 1. KoeBookshelf（ルート）
    // ==========================================
    function KoeBookshelf() {
      const [isLoading, setIsLoading] = useState(true);
      const [mode, setMode] = useState("grid");
      const [activeChapter, setActiveChapter] = useState("すべて");
      
      const [bookData, setBookData] = useState({
        user: { name: "あなた" },
        progress: { currentIndex: 0, total: 30 },
        pages: []
      });
      const [selectedAnswerId, setSelectedAnswerId] = useState(null);

      useEffect(() => {
        const loadBookshelf = async () => {
          try {
            // ▼ 実データ取得（GAS連携用）
            const storedUserId = localStorage.getItem('koe_user_id') || 'USR_DUMMY';
            const data = await apiFetch('getBookshelfData', { user_id: storedUserId });
            setBookData(data);
          } catch (e) {
            console.warn("GAS通信エラーのため、モックデータを表示します", e);
            // ▼ GAS側が未実装/エラー時のフォールバックデータ
            const dummyProgress = { currentIndex: 22, total: 30 };
            const dummyPages = Array.from({ length: 30 }, (_, i) => {
              const seq = i + 1;
              let chapter = "思い出す";
              if (seq > 6) chapter = "積み重ねる";
              if (seq > 15) chapter = "関係性";
              if (seq > 24) chapter = "手渡す";

              const isAnswered = seq <= 22;
              const hasPhoto = seq === 1 || seq === 5 || seq === 12;

              return {
                answer_id: `A${seq.toString().padStart(2, '0')}`,
                sequence_order: seq,
                chapter: chapter,
                question_text: `Q${seq}. これはダミーの質問文です。どんな情景が浮かびますか？`,
                transcript_edited: isAnswered ? "あの頃の情景が、昨日のことのように思い出されます。風の匂いや、誰かの呼ぶ声まで鮮明に残っています。" : "",
                ai_mirror_text: isAnswered ? "鮮明な記憶が、静かに形を成しています" : "",
                extracted_snippet: isAnswered ? "「あの頃の情景が、昨日のことのように...」" : "",
                is_answered: isAnswered,
                has_photo: hasPhoto
              };
            });
            setBookData({
              user: { name: "ひで" },
              progress: dummyProgress,
              pages: dummyPages
            });
          } finally {
            setIsLoading(false);
          }
        };
        loadBookshelf();
      }, []);

      const selectedPage = bookData.pages.find(p => p.answer_id === selectedAnswerId);

      if (isLoading) {
        return <div className="h-screen w-screen bg-[#0f172a] flex items-center justify-center text-white/30 tracking-widest text-sm">書架
