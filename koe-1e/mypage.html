Koe BOOK - mypage.html
user_questions完全対応版
========================================== -->

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Koe Bookshelf</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Noto Serif JP', serif;
      background-color: #0f172a;
      color: #f8fafc;
      margin: 0;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      height: 100%;
    }

    .fade-enter {
      animation: fadeIn .8s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .glass-card {
      background: rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.06);
      transition: all .3s ease;
    }

    .glass-card:hover {
      background: rgba(255,255,255,.045);
      border-color: rgba(255,255,255,.12);
    }

    .btn-quiet {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.82);
      transition: all .3s ease;
    }

    .btn-quiet:hover {
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.22);
    }

    audio {
      width: 100%;
      height: 36px;
      opacity: .75;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,.12);
      border-radius: 10px;
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useEffect, useMemo, useState } = React;

const SUPABASE_URL = "https://wquxjeqkumossjxehdop.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndxdXhqZXFrdW1vc3NqeGVoZG9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTEyMjksImV4cCI6MjA5MjU4NzIyOX0.wImRfRH2cr-w1uh2_c3vSS0_t4pHDeRWmWHZre1WbT4";

const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

function KoeBookshelf() {

  const [loading, setLoading] = useState(true);
  const [error, setError] = useState("");

  const [profile, setProfile] = useState(null);

  const [questionSet, setQuestionSet] = useState([]);
  const [answers, setAnswers] = useState([]);
  const [assets, setAssets] = useState([]);

  const [activeChapter, setActiveChapter] = useState("すべて");

  const [mode, setMode] = useState("grid");

  const [selectedSeq, setSelectedSeq] = useState(null);

  useEffect(() => {
    loadData();
  }, []);

  async function loadData() {

    setLoading(true);

    try {

      const {
        data: { session }
      } = await supabaseClient.auth.getSession();

      if (!session) {
        setError("ログイン情報が見つかりません");
        setLoading(false);
        return;
      }

      const userId = session.user.id;

      // ==========================================
      // profile
      // ==========================================

      const {
        data: profileData
      } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", userId)
        .maybeSingle();

      setProfile(profileData);

      // ==========================================
      // user_questions
      // ==========================================

      const {
        data: uqData,
        error: uqError
      } = await supabaseClient
        .from("user_questions")
        .select(`
          id,
          sequence_order,
          chapter,
          custom_question_text,
          question_id,
          questions (
            id,
            content,
            chapter
          )
        `)
        .eq("user_id", userId)
        .eq("is_active", true)
        .order("sequence_order", {
          ascending: true
        });

      if (uqError) {
        console.error(uqError);
        throw uqError;
      }

      const normalizedQuestions = (uqData || []).map(q => ({
        user_question_id: q.id,
        question_id: q.question_id,
        sequence_order: q.sequence_order,
        chapter:
          q.chapter ||
          q.questions?.chapter ||
          "その他",

        content:
          q.custom_question_text ||
          q.questions?.content ||
          ""
      }));

      setQuestionSet(normalizedQuestions);

      // ==========================================
      // answers
      // ==========================================

      const {
        data: answerData,
        error: answerError
      } = await supabaseClient
        .from("answers")
        .select("*")
        .eq("user_id", userId)
        .order("sequence_order", {
          ascending: true
        });

      if (answerError) {
        throw answerError;
      }

      setAnswers(answerData || []);

      // ==========================================
      // media_assets
      // ==========================================

      const answerIds =
        (answerData || []).map(a => a.id);

      if (answerIds.length > 0) {

        const {
          data: assetData
        } = await supabaseClient
          .from("media_assets")
          .select("*")
          .in("answer_id", answerIds);

        const signedAssets = await Promise.all(
          (assetData || []).map(async asset => {

            if (
              asset.asset_type !== "audio" ||
              !asset.storage_path
            ) {
              return asset;
            }

            const {
              data
            } = await supabaseClient
              .storage
              .from("audio")
              .createSignedUrl(
                asset.storage_path,
                60 * 30
              );

            return {
              ...asset,
              signed_url: data?.signedUrl || null
            };
          })
        );

        setAssets(signedAssets);
      }

    } catch (e) {

      console.error(e);

      setError("書架の読み込みに失敗しました");

    } finally {

      setLoading(false);

    }
  }

  // ==========================================
  // pages
  // ==========================================

  const pages = useMemo(() => {

    return questionSet.map(q => {

      const answer = answers.find(a =>
        a.sequence_order === q.sequence_order
      );

      const audio =
        answer
          ? assets.find(a =>
              a.answer_id === answer.id &&
              a.asset_type === "audio"
            )
          : null;

      return {

        sequence_order: q.sequence_order,

        chapter: q.chapter,

        question_text: q.content,

        is_answered: !!answer,

        transcript_edited:
          answer?.transcript_edited || "",

        transcript_raw:
          answer?.transcript_raw || "",

        ai_mirror:
          answer?.ai_mirror || "",

        snippet:
          answer?.snippet || "",

        audio

      };
    });

  }, [questionSet, answers, assets]);

  // ==========================================
  // chapters
  // ==========================================

  const chapters = useMemo(() => {

    const list = questionSet
      .map(q => q.chapter)
      .filter(Boolean);

    return [
      "すべて",
      ...Array.from(new Set(list))
    ];

  }, [questionSet]);

  const filteredPages =
    activeChapter === "すべて"
      ? pages
      : pages.filter(
          p => p.chapter === activeChapter
        );

  const progressCount =
    pages.filter(p => p.is_answered).length;

  const totalCount =
    pages.length;

  if (loading) {
    return (
      <div className="h-screen flex items-center justify-center">
        <p className="text-white/30 tracking-widest">
          書架を開いています...
        </p>
      </div>
    );
  }

  if (error) {
    return (
      <div className="h-screen flex flex-col items-center justify-center text-center px-8">
        <p className="text-white/45 mb-8">
          {error}
        </p>

        <button
          onClick={() => location.href = "v1.html"}
          className="btn-quiet px-8 py-4 rounded-full"
        >
          語るアプリを開く
        </button>
      </div>
    );
  }

  return (
    <div className="h-full flex flex-col bg-[#0f172a] fade-enter">

      {/* HEADER */}

      <header className="flex justify-between items-center px-6 md:px-10 py-5 border-b border-white/5 bg-white/[0.01]">

        <div>
          <p className="text-white/50 text-xs tracking-widest mb-1">
            {profile?.name || "あなた"}さんの物語
          </p>

          <p className="text-white/90 text-sm">
            {progressCount} / {totalCount} ページ
          </p>
        </div>

<div className="flex items-center gap-3">
  <button
    onClick={() => location.href = "settings.html"}
    className="text-white/35 hover:text-white/70 text-xs tracking-widest transition-colors"
  >
    設定
  </button>

  <button
    onClick={() => location.href = "v1.html"}
    className="btn-quiet rounded-full px-6 py-3 text-xs tracking-widest"
  >
    続きを語る
  </button>
</div>
      </header>

      <div className="flex flex-1 overflow-hidden">

        {/* SIDEBAR */}

        <aside className="hidden md:block w-64 border-r border-white/5 p-8 bg-white/[0.005] overflow-y-auto">

          <div className="space-y-1">

            {chapters.map(chapter => (

              <button
                key={chapter}
                onClick={() => {
                  setActiveChapter(chapter);
                  setMode("grid");
                }}
                className={`
                  block
                  w-full
                  text-left
                  py-3
                  px-4
                  rounded-md
                  text-[0.85rem]
                  transition-all

                  ${
                    activeChapter === chapter
                      ? "bg-white/[0.07] text-white/85"
                      : "text-white/40 hover:text-white/70 hover:bg-white/[0.03]"
                  }
                `}
              >
                {chapter}
              </button>

            ))}

          </div>

        </aside>

        {/* MAIN */}

        <main className="flex-1 overflow-y-auto bg-[#0d1321]">

          {mode === "grid" && (

            <GridView
              pages={filteredPages}
              activeChapter={activeChapter}
              onOpen={(seq) => {
                setSelectedSeq(seq);
                setMode("page");
              }}
            />

          )}

          {mode === "page" && (

            <PageDetail
              page={pages.find(
                p => p.sequence_order === selectedSeq
              )}
              pages={pages}
              selectedSeq={selectedSeq}
              onBack={() => setMode("grid")}
              onNavigate={setSelectedSeq}
            />

          )}

        </main>

      </div>

    </div>
  );
}

// ==========================================
// GRID VIEW
// ==========================================

function GridView({
  pages,
  activeChapter,
  onOpen
}) {

  return (
    <div className="max-w-6xl mx-auto p-8 md:p-10 pb-24">

      <h2 className="text-2xl text-white/90 tracking-widest mb-10">
        {activeChapter}
      </h2>

      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">

        {pages.map(page => (

          <div
            key={page.sequence_order}
            onClick={() => onOpen(page.sequence_order)}
            className={`
              glass-card
              p-6
              rounded-xl
              flex
              flex-col
              h-56
              cursor-pointer
              group

              ${
                page.is_answered
                  ? ""
                  : "opacity-40 hover:opacity-65"
              }
            `}
          >

            <div className="flex justify-between items-start mb-5">

              <p className="text-[0.65rem] text-white/35 tracking-[0.2em]">
                PAGE {page.sequence_order}
              </p>

              <div className={`
                rounded-full

                ${
                  page.is_answered
                    ? "w-2 h-2 bg-white/50"
                    : "w-2 h-2 border border-white/25"
                }
              `} />

            </div>

            <p className="text-[0.95rem] leading-[1.8] text-white/65 line-clamp-4 flex-1 group-hover:text-white/85">

              {
                page.is_answered
                  ? (
                      page.snippet ||
                      page.transcript_edited ||
                      "語りが保存されています"
                    )
                  : "まだ、このページは静かなままです"
              }

            </p>

            <p className="text-[0.75rem] text-white/35 truncate mt-5 tracking-widest">
              {page.question_text}
            </p>

          </div>

        ))}

      </div>

    </div>
  );
}

// ==========================================
// PAGE DETAIL
// ==========================================

function PageDetail({
  page,
  pages,
  selectedSeq,
  onBack,
  onNavigate
}) {

  if (!page) return null;

  const pageIndex =
    pages.findIndex(
      p => p.sequence_order === selectedSeq
    );

  const prevPage =
    pageIndex > 0
      ? pages[pageIndex - 1]
      : null;

  const nextPage =
    pageIndex < pages.length - 1
      ? pages[pageIndex + 1]
      : null;

  return (
    <div className="max-w-3xl mx-auto p-8 md:p-10 pb-24 fade-enter">

      <button
        onClick={onBack}
        className="mb-10 text-white/35 hover:text-white/70 text-sm"
      >
        ← 書架に戻る
      </button>

      <div className="text-center mb-12">

        <p className="text-white/30 text-xs tracking-[0.3em] mb-4">
          PAGE {page.sequence_order}
        </p>

        <h1 className="text-xl text-white/75 leading-loose whitespace-pre-wrap">
          {page.question_text}
        </h1>

      </div>

      {page.is_answered ? (

        <div className="fade-enter">

          <div className="mb-10 p-6 bg-white/[0.04] border-l-2 border-amber-500/50 rounded-r-lg">

            <p className="text-amber-50/90 text-[0.95rem] italic leading-relaxed">
              {page.ai_mirror || "ひとつの時間が、形になっています"}
            </p>

          </div>

          <p className="text-white/90 text-[1.05rem] leading-[2.4] whitespace-pre-wrap mb-12">

            {
              page.transcript_edited ||
              page.transcript_raw ||
              "（本文はまだありません）"
            }

          </p>

          {page.audio?.signed_url && (

            <div className="glass-card rounded-xl p-5 mb-12">

              <p className="text-white/35 text-xs tracking-widest mb-3">
                ORIGINAL VOICE
              </p>

              <audio
                controls
                src={page.audio.signed_url}
              />

            </div>

          )}

        </div>

      ) : (

        <div className="text-center py-20 fade-enter">

          <p className="text-white/40 text-[0.95rem] mb-6">
            まだ、このページは静かなままです。
          </p>

          <p className="text-white/30 text-[0.85rem] italic mb-14">
            言葉になるときを、待っています。
          </p>

          <button
            onClick={() => location.href = "v1.html"}
            className="btn-quiet px-10 py-4 rounded-full"
          >
            この問いについて語る
          </button>

        </div>

      )}

      {/* pager */}

      <div className="mt-20 pt-8 border-t border-white/10 grid grid-cols-2 gap-8">

        <div>

          {prevPage && (

            <button
              onClick={() => onNavigate(prevPage.sequence_order)}
              className="w-full text-left px-4 py-4 rounded-xl hover:bg-white/[0.03]"
            >

              <p className="text-white/30 text-[0.65rem] mb-2">
                前のページ
              </p>

              <p className="text-white/70 text-[0.9rem]">
                PAGE {prevPage.sequence_order}
              </p>

            </button>

          )}

        </div>

        <div>

          {nextPage && (

            <button
              onClick={() => onNavigate(nextPage.sequence_order)}
              className="w-full text-right px-4 py-4 rounded-xl hover:bg-white/[0.03]"
            >

              <p className="text-white/30 text-[0.65rem] mb-2">
                次のページ
              </p>

              <p className="text-white/70 text-[0.9rem]">
                PAGE {nextPage.sequence_order}
              </p>

            </button>

          )}

        </div>

      </div>

    </div>
  );
}

ReactDOM
  .createRoot(document.getElementById("root"))
  .render(<KoeBookshelf />);

</script>
</body>
</html>
